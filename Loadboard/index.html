<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>USPS Load Board</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@800&family=IBM+Plex+Mono&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:#f4f3ef;color:#1a1a18;min-height:100vh}
.logo{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:22px;color:#BA7517;letter-spacing:.06em}
.mono{font-family:'IBM Plex Mono',monospace;font-size:12px}
.st{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:17px;letter-spacing:.04em}
.sv{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:28px}
.sl{font-size:11px;font-weight:500;color:#888780;text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px}
.nav{background:#fff;border-bottom:.5px solid rgba(0,0,0,.1);padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:52px;position:sticky;top:0;z-index:100}
.page{max-width:1200px;margin:0 auto;padding:22px 20px}
.card{background:#fff;border:.5px solid rgba(0,0,0,.09);border-radius:12px;overflow:hidden;margin-bottom:16px}
.sh{display:flex;justify-content:space-between;align-items:center;padding:13px 16px;border-bottom:.5px solid rgba(0,0,0,.08);flex-wrap:wrap;gap:8px}
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:20px}
.sc{background:#ece9e2;border-radius:8px;padding:13px 15px}
table{border-collapse:collapse;width:100%}
th{text-align:left;font-size:11px;font-weight:500;color:#888780;text-transform:uppercase;letter-spacing:.07em;padding:9px 14px;border-bottom:.5px solid rgba(0,0,0,.09);white-space:nowrap;background:#fafaf8}
td{padding:10px 14px;font-size:13px;border-bottom:.5px solid rgba(0,0,0,.07);color:#1a1a18;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafaf8}
.oa{overflow-x:auto}
label{display:block;font-size:11px;font-weight:500;color:#888780;margin-bottom:5px;text-transform:uppercase;letter-spacing:.07em}
input,select{width:100%;padding:8px 10px;border:.5px solid rgba(0,0,0,.2);border-radius:8px;background:#fff;color:#1a1a18;font-family:'Inter',sans-serif;font-size:13px;outline:none}
input:focus,select:focus{border-color:#BA7517;box-shadow:0 0 0 2px rgba(186,117,23,.15)}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ff{margin-bottom:12px}
.ds{border-top:.5px solid rgba(0,0,0,.09);padding-top:16px;margin-top:8px}
.dl{font-size:11px;font-weight:500;color:#BA7517;text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
button{cursor:pointer;font-family:'Inter',sans-serif;line-height:1;border-radius:8px;font-size:13px;font-weight:500;transition:opacity .15s}
button:hover{opacity:.8}
button:active{opacity:.6}
.bp{background:#BA7517;color:#fff;border:none;padding:9px 18px}
.bo{background:transparent;color:#BA7517;border:.5px solid #BA7517;padding:8px 17px}
.bg{background:transparent;color:#5F5E5A;border:.5px solid rgba(0,0,0,.18);padding:8px 17px}
.bd{background:transparent;color:#A32D2D;border:.5px solid rgba(163,45,45,.4);padding:8px 17px}
.tg{display:flex;gap:8px;flex-wrap:wrap}
.tgl{padding:7px 16px;border-radius:8px;font-size:13px;font-weight:500;border:.5px solid rgba(0,0,0,.15);background:transparent;color:#5F5E5A;cursor:pointer}
.tgl.on{border-color:#BA7517;background:rgba(186,117,23,.1);color:#412402}
.badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:4px;font-size:11px;font-weight:500;letter-spacing:.04em;white-space:nowrap}
.ba{background:rgba(186,117,23,.12);color:#412402;border:.5px solid #BA7517}
.bs{background:rgba(63,109,17,.1);color:#27500A;border:.5px solid rgba(63,109,17,.4)}
.brd{background:rgba(163,45,45,.1);color:#791F1F;border:.5px solid rgba(163,45,45,.4)}
.bi{background:rgba(24,95,165,.1);color:#0C447C;border:.5px solid rgba(24,95,165,.3)}
.bgr{background:rgba(0,0,0,.05);color:#5F5E5A;border:.5px solid rgba(0,0,0,.12)}
.err{background:rgba(163,45,45,.08);border:.5px solid rgba(163,45,45,.35);border-radius:8px;padding:9px 13px;color:#791F1F;font-size:13px;margin-bottom:14px}
.ok{background:rgba(63,109,17,.08);border:.5px solid rgba(63,109,17,.35);border-radius:8px;padding:9px 13px;color:#27500A;font-size:13px;margin-bottom:14px}
.tw{background:rgba(163,45,45,.08);border:.5px solid rgba(163,45,45,.35);border-radius:8px;padding:9px 13px;color:#791F1F;font-size:13px;margin-bottom:16px}
.tabs{display:flex;border-bottom:.5px solid rgba(0,0,0,.1);margin-bottom:18px}
.tab{padding:9px 16px;background:none;border:none;border-bottom:2px solid transparent;color:#888780;font-size:13px;font-weight:500;cursor:pointer;margin-bottom:-1px;font-family:'Inter',sans-serif;border-radius:0}
.tab.on{color:#BA7517;border-bottom-color:#BA7517}
.auth-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:#f4f3ef}
.auth-card{background:#fff;border:.5px solid rgba(0,0,0,.1);border-radius:14px;width:100%;max-width:420px;overflow:hidden}
.stop-badge{display:inline-block;background:#f4f3ef;border:.5px solid rgba(0,0,0,.12);border-radius:4px;padding:2px 7px;font-size:11px;color:#5F5E5A;margin:2px 2px 2px 0;font-family:'IBM Plex Mono',monospace}
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;padding:10px 16px;border-bottom:.5px solid rgba(0,0,0,.08);background:#fafaf8}
.fi{border:.5px solid rgba(0,0,0,.2);border-radius:8px;padding:6px 10px;font-size:12px;outline:none;font-family:'Inter',sans-serif;background:#fff;color:#1a1a18;width:auto}
.proxy-banner{background:#fff8ec;border-bottom:.5px solid #BA7517;padding:10px 20px;font-size:12px;color:#412402;display:flex;align-items:center;gap:8px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.live-dot{width:7px;height:7px;border-radius:50%;background:#3B6D11;display:inline-block;margin-right:5px;animation:pulse 2s infinite}
.spin{display:inline-block;animation:spin 1s linear infinite}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px}
.modal{background:#fff;border-radius:14px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto}
</style>
</head>
<body>
<div id="app">
  <div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:'Barlow Condensed',sans-serif;font-size:22px;color:#BA7517;letter-spacing:.06em">
    LOADING...
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════
   PASTE YOUR CLOUDFLARE WORKER URL BELOW
   ═══════════════════════════════════════════════════ */
var PROXY_URL = 'https://restless-lab-de0d.biegajpeter.workers.dev';

/* ═══════════════════════════════════════════════════
   ADMIN CREDENTIALS
   ═══════════════════════════════════════════════════ */
var ADMIN_EMAIL = 'admin@loadboard.com';
var ADMIN_PASS  = 'Admin@2026';

var CHANNEL = 'ben_usps';
var REFRESH_MS = 120000;
var PROXY_MISSING = PROXY_URL.indexOf('PASTE_') === 0;

/* ── storage ── */
function store(k,v){ try{ if(v===undefined) return JSON.parse(localStorage.getItem(k)||'null'); localStorage.setItem(k,JSON.stringify(v)); }catch(e){return null;} }

/* ── telegram parser ── */
function parseHTML(html){
  var div=document.createElement('div'); div.innerHTML=html;
  var msgs=div.querySelectorAll('.tgme_widget_message');
  var loads=[]; var seen={};
  msgs.forEach(function(msg){
    var el=msg.querySelector('.tgme_widget_message_text');
    if(!el) return;
    var txt=el.innerText||el.textContent||'';
    if(txt.indexOf('New Load Bid')<0) return;
    try{
      var load=parseLoad(txt,msg);
      if(load&&!seen[load.id]){ seen[load.id]=1; loads.push(load); }
    }catch(e){}
  });
  loads.sort(function(a,b){return b.ts-a.ts;});
  return loads;
}

function parseLoad(txt,msgEl){
  var idM=txt.match(/New Load Bid[:\s#*`_]+(\d+)/i);
  if(!idM) return null;
  var distM=txt.match(/Distance[:\s*_]+([0-9,]+\.?\d*)\s*miles?/i);
  var pickM=txt.match(/Pickup[:\s*_]+([0-9/]+ [0-9:]+ [APM]+)/i);
  var delM =txt.match(/Delivery[:\s*_]+([0-9/]+ [0-9:]+ [APM]+)/i);
  var stops=[]; var re=/Stop\s+(\d+)[:\s*_]+([A-Z][A-Z\s]+,\s*[A-Z]{2}\s+\d{5})/gi; var m;
  while((m=re.exec(txt))!==null) stops.push({num:parseInt(m[1]),loc:m[2].trim()});
  if(stops.length<2) return null;
  var miles=distM?parseFloat(distM[1].replace(',','\'').replace(',','')):0;
  var timeEl=msgEl&&msgEl.querySelector('.tgme_widget_message_date time');
  var linkEl=msgEl&&msgEl.querySelector('a.tgme_widget_message_date');
  return {
    id:idM[1], miles:miles,
    origin:stops[0].loc, dest:stops[stops.length-1].loc, stops:stops,
    pickup:pickM?pickM[1]:'—', delivery:delM?delM[1]:'—',
    ts:timeEl?new Date(timeEl.getAttribute('datetime')).getTime():Date.now(),
    link:linkEl?linkEl.href:'https://t.me/'+CHANNEL,
    isTeam:miles>=500
  };
}

function fetchLoads(){
  var url=PROXY_MISSING?'https://t.me/s/'+CHANNEL:PROXY_URL+'?channel='+CHANNEL;
  return fetch(url).then(function(r){return r.text();}).then(function(html){return parseHTML(html);});
}

/* ═══════════════════════════════════════════════════
   MINI UI FRAMEWORK (no React dependency)
   ═══════════════════════════════════════════════════ */
var _state={
  view:'auth', // auth | board | admin
  session:null,
  loads:[], loading:false, error:'', lastRefresh:null,
  users:[], bids:[],
  bidLoad:null, toast:'',
  tab:'loads',
  authTab:'login',
  authErr:'', authOk:'',
  search:'', stateFilter:'', minMi:'', maxMi:'',
  form:{email:'',pw:'',confirm:'',carrier:'',mc:'',
        rate:'',eta:'',d1n:'',d1p:'',d1nd:false,d2n:'',d2p:'',d2nd:false}
};

function setState(patch){
  Object.assign(_state,patch);
  render();
}

/* ── helpers ── */
function el(tag,attrs,children){
  var node=document.createElement(tag);
  if(attrs) Object.keys(attrs).forEach(function(k){
    if(k==='style'&&typeof attrs[k]==='object'){
      Object.assign(node.style,attrs[k]);
    } else if(k.indexOf('on')===0){
      node.addEventListener(k.slice(2).toLowerCase(),attrs[k]);
    } else if(k==='className'){
      node.className=attrs[k];
    } else if(k==='htmlFor'){
      node.htmlFor=attrs[k];
    } else {
      try{ node.setAttribute(k,attrs[k]); }catch(e){}
    }
  });
  if(children){
    (Array.isArray(children)?children:[children]).forEach(function(c){
      if(c===null||c===undefined||c===false) return;
      if(typeof c==='string'||typeof c==='number') node.appendChild(document.createTextNode(String(c)));
      else node.appendChild(c);
    });
  }
  return node;
}

function badge(cls,txt){ return el('span',{className:'badge '+cls},txt); }
function btn(cls,txt,onClick,style){ return el('button',{className:cls,style:style||{},onClick:onClick},txt); }
function fld(lbl,inp){ var d=el('div',{className:'ff'}); d.appendChild(el('label',null,lbl)); d.appendChild(inp); return d; }
function inp(attrs){
  var i=document.createElement('input');
  Object.assign(i,attrs);
  if(attrs.onInput) i.addEventListener('input',attrs.onInput);
  if(attrs.onKeydown) i.addEventListener('keydown',attrs.onKeydown);
  return i;
}
function sel(opts,val,onChange){
  var s=document.createElement('select');
  opts.forEach(function(o){ var op=document.createElement('option'); op.value=o.v||o; op.textContent=o.l||o; if((o.v||o)===val) op.selected=true; s.appendChild(op); });
  s.addEventListener('change',function(){ onChange(s.value); });
  return s;
}
function div(cls,children,style){
  var d=el('div',{className:cls,style:style||{}});
  (Array.isArray(children)?children:[children]).forEach(function(c){
    if(!c) return;
    if(typeof c==='string') d.appendChild(document.createTextNode(c));
    else d.appendChild(c);
  });
  return d;
}
function row(children,style){ return div('',children,Object.assign({display:'flex',alignItems:'center',gap:'8px',flexWrap:'wrap'},style||{})); }

/* ── render ── */
function render(){
  var app=document.getElementById('app');
  app.innerHTML='';
  var view;
  try{
    if(_state.view==='auth') view=renderAuth();
    else if(_state.view==='board') view=renderBoard();
    else if(_state.view==='admin') view=renderAdmin();
    else view=renderAuth();
  }catch(e){
    view=el('div',{style:{padding:'40px',color:'#A32D2D',fontFamily:'monospace',fontSize:13}},
      'Error: '+e.message+'\n\nPlease refresh the page.'
    );
  }
  app.appendChild(view);
}

function renderLoading(){
  return el('div',{style:{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',fontFamily:"'Barlow Condensed',sans-serif",fontSize:'22px',color:'#BA7517',letterSpacing:'.06em'}},'LOADING...');
}

/* ── Auth ── */
function renderAuth(){
  var f=_state.form;
  var isLogin=_state.authTab==='login';

  function setForm(k,v){ var nf=Object.assign({},_state.form); nf[k]=v; setState({form:nf}); }

  function doLogin(){
    setState({authErr:''});
    if(f.email.trim()===ADMIN_EMAIL&&f.pw===ADMIN_PASS){
      var u={id:'__admin',role:'admin',email:ADMIN_EMAIL};
      store('lb_sess',u); setState({session:u,view:'admin',authErr:''});
      return;
    }
    var users=store('lb_users')||[];
    var u=users.find(function(u){return u.email.toLowerCase()===f.email.trim().toLowerCase()&&u.pw===f.pw;});
    if(!u){setState({authErr:'Invalid email or password.'});return;}
    if(u.status==='pending'){setState({authErr:'Account pending admin approval.'});return;}
    if(u.status==='denied'){setState({authErr:'Account access denied.'});return;}
    store('lb_sess',u); setState({session:u,view:'board'});
  }

  function doRegister(){
    setState({authErr:''});
    if(!f.carrier||!f.mc||!f.email||!f.pw){setState({authErr:'All fields are required.'});return;}
    if(f.pw!==f.confirm){setState({authErr:'Passwords do not match.'});return;}
    if(f.pw.length<6){setState({authErr:'Password must be at least 6 characters.'});return;}
    var users=store('lb_users')||[];
    if(users.find(function(u){return u.email.toLowerCase()===f.email.trim().toLowerCase();})){setState({authErr:'Email already registered.'});return;}
    if(users.find(function(u){return u.mc.trim()===f.mc.trim();})){setState({authErr:'MC # already registered.'});return;}
    var user={id:'USR-'+Date.now(),role:'carrier',carrier:f.carrier.trim(),mc:f.mc.trim(),email:f.email.trim(),pw:f.pw,status:'pending',at:Date.now()};
    store('lb_users',[...users,user]);
    setState({authOk:'Registration submitted! Awaiting admin approval.',authTab:'login',form:Object.assign({},_state.form,{email:'',pw:'',confirm:'',carrier:'',mc:''})});
  }

  var wrap=div('auth-wrap',[
    div('',[ 
      el('div',{className:'logo',style:{fontSize:'30px',marginBottom:'6px',display:'block',textAlign:'center'}},'USPS LOAD BOARD'),
      el('div',{style:{fontSize:'12px',color:'#888780',letterSpacing:'.08em',textTransform:'uppercase',textAlign:'center',marginBottom:'28px'}},'Carrier Freight Portal')
    ]),
    div('auth-card',[
      row([
        el('button',{className:'tab'+(isLogin?' on':''),style:{flex:'1',padding:'12px 0',textTransform:'uppercase',letterSpacing:'.07em',fontSize:'12px',borderRadius:'0',borderBottom:'2px solid '+(isLogin?'#BA7517':'transparent'),color:isLogin?'#BA7517':'#888780'},onClick:function(){setState({authTab:'login',authErr:'',authOk:''});}}, 'Sign In'),
        el('button',{className:'tab'+(!isLogin?' on':''),style:{flex:'1',padding:'12px 0',textTransform:'uppercase',letterSpacing:'.07em',fontSize:'12px',borderRadius:'0',borderBottom:'2px solid '+(!isLogin?'#BA7517':'transparent'),color:!isLogin?'#BA7517':'#888780'},onClick:function(){setState({authTab:'register',authErr:'',authOk:''});}}, 'Request Access')
      ],{borderBottom:'.5px solid rgba(0,0,0,.09)',marginBottom:'0',gap:'0'}),
      div('',isLogin?[
        _state.authErr?div('err',_state.authErr):null,
        _state.authOk?div('ok',_state.authOk):null,
        fld('Email', el('input',{type:'email',placeholder:'your@email.com',value:f.email,onInput:function(e){setForm('email',e.target.value);},style:{marginBottom:'0'}})),
        fld('Password', el('input',{type:'password',placeholder:'••••••••',value:f.pw,onInput:function(e){setForm('pw',e.target.value);},onKeydown:function(e){if(e.key==='Enter')doLogin();},style:{marginBottom:'0'}})),
        btn('bp','Sign In',doLogin,{width:'100%',marginTop:'6px'})
      ]:[
        _state.authErr?div('err',_state.authErr):null,
        _state.authOk?div('ok',_state.authOk):null,
        fld('Carrier Name', el('input',{type:'text',placeholder:'ABC Trucking LLC',value:f.carrier,onInput:function(e){setForm('carrier',e.target.value);}})),
        fld('MC #', el('input',{type:'text',placeholder:'MC-123456',value:f.mc,onInput:function(e){setForm('mc',e.target.value);}})),
        fld('Email', el('input',{type:'email',placeholder:'dispatch@company.com',value:f.email,onInput:function(e){setForm('email',e.target.value);}})),
        fld('Password', el('input',{type:'password',placeholder:'Min. 6 characters',value:f.pw,onInput:function(e){setForm('pw',e.target.value);}})),
        fld('Confirm Password', el('input',{type:'password',placeholder:'Re-enter password',value:f.confirm,onInput:function(e){setForm('confirm',e.target.value);}})),
        btn('bp','Submit Registration',doRegister,{width:'100%',marginTop:'6px'}),
        el('p',{style:{fontSize:'11px',color:'#888780',textAlign:'center',marginTop:'10px',lineHeight:'1.6'}},'Account requires admin approval before access.')
      ],{padding:'22px'})
    ])
  ]);
  return wrap;
}

/* ── Nav ── */
function renderNav(session){
  var nav=el('div',{className:'nav'});
  nav.appendChild(el('span',{className:'logo'},'USPS LOAD BOARD'));
  var right=div('',[ 
    session.role!=='admin'?el('span',{style:{fontSize:'13px',color:'#5F5E5A'}},session.carrier+' '):null,
    session.role!=='admin'?el('span',{className:'mono',style:{color:'#BA7517'}},session.mc):null,
    session.role==='admin'?el('span',{style:{fontSize:'12px',color:'#888780',background:'#f4f3ef',padding:'2px 8px',borderRadius:'4px'}},'ADMIN'):null,
    btn('bg','Log Out',function(){store('lb_sess',null);setState({session:null,view:'auth'});},{padding:'6px 12px',fontSize:'12px'})
  ],{gap:'10px'});
  nav.appendChild(right);
  return nav;
}

/* ── Stats ── */
function statGrid(items){
  var g=el('div',{className:'sg'});
  items.forEach(function(s){
    var c=div('sc',[el('div',{className:'sl'},s.label),el('div',{className:'sv',style:{color:s.color}},String(s.val))]);
    g.appendChild(c);
  });
  return g;
}

/* ── Board ── */
function renderBoard(){
  var session=_state.session;
  var loads=_state.loads;
  var bids=store('lb_bids')||[];
  var myBids=bids.filter(function(b){return b.carrierId===session.id;});

  var states=[]; var seen={};
  loads.forEach(function(l){l.stops.forEach(function(s){var m=s.loc.match(/,\s*([A-Z]{2})\s/);if(m&&!seen[m[1]]){seen[m[1]]=1;states.push(m[1]);}});});
  states.sort();

  var filtered=loads.filter(function(l){
    var q=_state.search.toLowerCase();
    if(q&&l.origin.toLowerCase().indexOf(q)<0&&l.dest.toLowerCase().indexOf(q)<0&&l.id.indexOf(_state.search)<0) return false;
    if(_state.stateFilter&&!l.stops.some(function(s){return s.loc.indexOf(', '+_state.stateFilter+' ')>=0;})) return false;
    if(_state.minMi&&l.miles<Number(_state.minMi)) return false;
    if(_state.maxMi&&l.miles>Number(_state.maxMi)) return false;
    return true;
  });

  var frag=document.createDocumentFragment();

  if(PROXY_MISSING) frag.appendChild(div('proxy-banner','⚠ Cloudflare Worker not configured yet — loads may not appear.'));
  frag.appendChild(renderNav(session));

  var page=div('page',[]);

  if(_state.toast){
    var toastEl=div('ok',_state.toast,{display:'flex',justifyContent:'space-between',marginBottom:'14px'});
    var closeBtn=btn('',  '×',function(){setState({toast:''});},{background:'none',border:'none',color:'#27500A',fontSize:'16px',cursor:'pointer'});
    toastEl.appendChild(closeBtn);
    page.appendChild(toastEl);
  }

  page.appendChild(statGrid([
    {label:'Live Loads',val:loads.length,color:'#BA7517'},
    {label:'Team Required',val:loads.filter(function(l){return l.isTeam;}).length,color:'#A32D2D'},
    {label:'My Bids',val:myBids.length,color:'#3B6D11'},
    {label:'Awarded',val:myBids.filter(function(b){return b.status==='awarded';}).length,color:'#185FA5'}
  ]));

  // Main loads card
  var card=div('card',[]);

  // Card header
  var sh=div('sh',[
    div('',[ 
      el('span',{className:'st'},'Available Loads'),
      !_state.loading?el('span',{style:{fontSize:'11px',color:'#888780',marginLeft:'10px'}},'● Live · '+filtered.length+' shown'):null,
      _state.loading?el('span',{style:{fontSize:'12px',color:'#888780',marginLeft:'10px'}},'↻ Refreshing...'):null
    ],{display:'flex',alignItems:'center'}),
    row([
      _state.lastRefresh?el('span',{style:{fontSize:'11px',color:'#aaa'}},'Updated '+_state.lastRefresh.toLocaleTimeString()):null,
      btn('bg','↻ Refresh',function(){doRefresh();},{padding:'5px 12px',fontSize:'12px'})
    ])
  ]);
  card.appendChild(sh);

  // Filter bar
  var fb=div('filter-bar',[]);
  var si=document.createElement('input');
  si.className='fi'; si.placeholder='Search load #, city...'; si.value=_state.search; si.style.flex='1'; si.style.minWidth='150px'; si.style.maxWidth='240px';
  si.addEventListener('input',function(){setState({search:si.value});});
  fb.appendChild(si);

  var stateOpts=[{v:'',l:'All States'}].concat(states.map(function(s){return{v:s,l:s};}));
  var ss=sel(stateOpts,_state.stateFilter,function(v){setState({stateFilter:v});});
  ss.className='fi'; fb.appendChild(ss);

  var mn=document.createElement('input'); mn.className='fi'; mn.placeholder='Min mi'; mn.type='number'; mn.value=_state.minMi; mn.style.width='75px';
  mn.addEventListener('input',function(){setState({minMi:mn.value});});
  fb.appendChild(mn);

  var mx=document.createElement('input'); mx.className='fi'; mx.placeholder='Max mi'; mx.type='number'; mx.value=_state.maxMi; mx.style.width='75px';
  mx.addEventListener('input',function(){setState({maxMi:mx.value});});
  fb.appendChild(mx);

  if(_state.search||_state.stateFilter||_state.minMi||_state.maxMi){
    fb.appendChild(btn('',  '✕ Clear',function(){setState({search:'',stateFilter:'',minMi:'',maxMi:'\'});},{background:'none',border:'none',color:'#888780',cursor:'pointer',fontSize:'12px'}));
  }
  card.appendChild(fb);

  if(_state.error) card.appendChild(div('err',_state.error,{margin:'12px 16px'}));

  // Table
  var oa=div('oa',[]);
  var tbl=document.createElement('table');
  var thead=document.createElement('thead');
  var hr=document.createElement('tr');
  ['Load #','Origin','Destination','Miles','Pickup','Delivery','Stops','',''].forEach(function(h){var th=document.createElement('th');th.textContent=h;hr.appendChild(th);});
  thead.appendChild(hr); tbl.appendChild(thead);
  var tbody=document.createElement('tbody');

  if(filtered.length===0&&!_state.loading){
    var tr=document.createElement('tr'); var td=document.createElement('td'); td.colSpan=9; td.style.textAlign='center'; td.style.padding='48px'; td.style.color='#888780';
    td.textContent=loads.length===0?'No loads yet — try refreshing.':'No loads match filters.';
    tr.appendChild(td); tbody.appendChild(tr);
  } else {
    filtered.forEach(function(load){
      var mb=myBids.find(function(b){return b.loadId===load.id;});
      var tr=document.createElement('tr');
      function td(content,style){var t=document.createElement('td');if(style)Object.assign(t.style,style);if(typeof content==='string'||typeof content==='number')t.textContent=content;else t.appendChild(content);tr.appendChild(t);return t;}

      var a=document.createElement('a'); a.href=load.link; a.target='_blank'; a.rel='noreferrer'; a.textContent='#'+load.id; a.style.color='#BA7517'; a.style.fontFamily='IBM Plex Mono,monospace'; a.style.fontSize='12px'; a.style.textDecoration='none';
      td(a);
      td(load.origin,{fontWeight:'500'});
      td(load.dest);
      var milesCell=document.createElement('td');
      var milesSpan=document.createElement('span'); milesSpan.textContent=load.miles.toLocaleString(); milesSpan.style.color=load.isTeam?'#A32D2D':'inherit'; milesSpan.style.fontWeight=load.isTeam?'600':'400';
      milesCell.appendChild(milesSpan);
      if(load.isTeam){ var tb=badge('brd','TEAM'); tb.style.marginLeft='5px'; milesCell.appendChild(tb); }
      tr.appendChild(milesCell);
      td(load.pickup,{fontFamily:'IBM Plex Mono,monospace',fontSize:'11px'});
      td(load.delivery,{fontFamily:'IBM Plex Mono,monospace',fontSize:'11px'});
      td(load.stops.length+' stop'+(load.stops.length!==1?'s':''),{fontSize:'11px',color:'#888780'});
      var statusCell=document.createElement('td'); statusCell.appendChild(mb?badge('bs','BID PLACED'):badge('ba','OPEN')); tr.appendChild(statusCell);
      var actCell=document.createElement('td');
      var bidBtn=btn(mb?'bo':'bp',mb?'Edit':'Bid',function(){openBid(load);},{padding:'5px 12px',fontSize:'12px'});
      actCell.appendChild(bidBtn); tr.appendChild(actCell);
      tbody.appendChild(tr);
    });
  }
  tbl.appendChild(tbody); oa.appendChild(tbl); card.appendChild(oa);
  page.appendChild(card);

  // My bids
  if(myBids.length>0){
    var bc=div('card',[]);
    bc.appendChild(div('sh',[el('span',{className:'st'},'My Bids')]));
    var boa=div('oa',[]);
    var bt=document.createElement('table');
    var bhead=document.createElement('thead'); var bhr=document.createElement('tr');
    ['Load #','Route','Rate','ETA','Driver(s)','Status'].forEach(function(h){var th=document.createElement('th');th.textContent=h;bhr.appendChild(th);}); bhead.appendChild(bhr); bt.appendChild(bhead);
    var btbody=document.createElement('tbody');
    myBids.forEach(function(bid){
      var ld=loads.find(function(l){return l.id===bid.loadId;});
      var tr=document.createElement('tr');
      function td(c,s){var t=document.createElement('td');if(s)Object.assign(t.style,s);if(typeof c==='string'||typeof c==='number')t.textContent=c;else t.appendChild(c);tr.appendChild(t);}
      td('#'+bid.loadId,{fontFamily:'IBM Plex Mono,monospace',color:'#BA7517',fontSize:'12px'});
      td(ld?ld.origin+' → '+ld.dest:'—');
      td('$'+Number(bid.rate||0).toLocaleString(),{fontFamily:'IBM Plex Mono,monospace',color:'#3B6D11',fontSize:'12px'});
      td(bid.eta,{fontFamily:'IBM Plex Mono,monospace',fontSize:'11px'});
      td(bid.d1n+(bid.d2n?' / '+bid.d2n:''),{fontSize:'12px'});
      var sc=document.createElement('td'); sc.appendChild(badge(bid.status==='awarded'?'bs':bid.status==='rejected'?'brd':'ba',(bid.status||'pending').toUpperCase())); tr.appendChild(sc);
      btbody.appendChild(tr);
    });
    bt.appendChild(btbody); boa.appendChild(bt); bc.appendChild(boa);
    page.appendChild(bc);
  }

  frag.appendChild(page);

  // Bid modal
  if(_state.bidLoad){
    frag.appendChild(renderBidModal(_state.bidLoad,session));
  }

  return frag;
}

function openBid(load){ setState({bidLoad:load}); }

function renderBidModal(load,session){
  var f=_state.form;
  var isTeam=load.miles>=500;
  var bids=store('lb_bids')||[];
  var existing=bids.find(function(b){return b.loadId===load.id&&b.carrierId===session.id;});

  function setF(k,v){var nf=Object.assign({},_state.form);nf[k]=v;setState({form:nf});}

  function submit(){
    if(!f.rate||!f.eta||!f.d1n||!f.d1p){alert('Complete all required fields.');return;}
    if(isTeam&&(!f.d2n||!f.d2p)){alert('Team load: both drivers required.');return;}
    var bid=Object.assign({},f,{loadId:load.id,carrierId:session.id,carrierName:session.carrier,mc:session.mc,status:'pending',at:Date.now()});
    var all=(store('lb_bids')||[]).filter(function(b){return!(b.loadId===load.id&&b.carrierId===session.id);});
    store('lb_bids',[...all,bid]);
    setState({bidLoad:null,toast:'Bid submitted for load #'+load.id+'!'});
  }

  var bg=div('modal-bg',[]);
  var modal=div('modal',[]);

  // Header
  var mh=div('',[ 
    div('',[
      el('div',{style:{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:'800',fontSize:'20px'}},'Place Bid — #'+load.id),
      el('div',{style:{fontSize:'12px',color:'#888780',marginTop:'2px'}},load.origin+' → '+load.dest+' · '+load.miles.toLocaleString()+' mi')
    ]),
    btn('',  '×',function(){setState({bidLoad:null});},{background:'none',border:'none',fontSize:'22px',color:'#888780',cursor:'pointer',padding:'0 4px'})
  ],{padding:'16px 20px',borderBottom:'.5px solid rgba(0,0,0,.09)',display:'flex',justifyContent:'space-between',alignItems:'center'});
  modal.appendChild(mh);

  var body=div('',null,{padding:'20px'});
  if(isTeam) body.appendChild(div('tw','⚠ This load is '+load.miles.toLocaleString()+' miles — team required. Provide info for both drivers.'));

  // Rate + ETA
  var rateRow=el('div',{className:'fg'});
  rateRow.appendChild(fld('All-In Rate ($)',el('input',{type:'number',placeholder:'0',value:f.rate,onInput:function(e){setF('rate',e.target.value);}})));
  rateRow.appendChild(fld('ETA to Destination',el('input',{type:'date',value:f.eta,onInput:function(e){setF('eta',e.target.value);}})));
  body.appendChild(rateRow);

  // Driver 1
  var d1=div('ds',[]);
  d1.appendChild(el('div',{className:'dl'},isTeam?'Driver 1':'Driver Info'));
  var d1row=el('div',{className:'fg'});
  d1row.appendChild(fld('Full Name',el('input',{type:'text',placeholder:'John Smith',value:f.d1n,onInput:function(e){setF('d1n',e.target.value);}})));
  d1row.appendChild(fld('Phone Number',el('input',{type:'tel',placeholder:'(555) 000-0000',value:f.d1p,onInput:function(e){setF('d1p',e.target.value);}})));
  d1.appendChild(d1row);
  var d1nd=fld('CDL Non-Domiciled?',div('tg',[
    btn('tgl'+(f.d1nd===true?' on':''),'Yes',function(){setF('d1nd',true);}),
    btn('tgl'+(f.d1nd===false?' on':''),'No',function(){setF('d1nd',false);})
  ]));
  d1.appendChild(d1nd); body.appendChild(d1);

  // Driver 2 (team only)
  if(isTeam){
    var d2=div('ds',null,{marginTop:'14px'});
    d2.appendChild(el('div',{className:'dl',style:{color:'#185FA5'}},'Driver 2 — Team'));
    var d2row=el('div',{className:'fg'});
    d2row.appendChild(fld('Full Name',el('input',{type:'text',placeholder:'Jane Doe',value:f.d2n,onInput:function(e){setF('d2n',e.target.value);}})));
    d2row.appendChild(fld('Phone Number',el('input',{type:'tel',placeholder:'(555) 000-0000',value:f.d2p,onInput:function(e){setF('d2p',e.target.value);}})));
    d2.appendChild(d2row);
    var d2nd=fld('CDL Non-Domiciled?',div('tg',[
      btn('tgl'+(f.d2nd===true?' on':''),'Yes',function(){setF('d2nd',true);}),
      btn('tgl'+(f.d2nd===false?' on':''),'No',function(){setF('d2nd',false);})
    ]));
    d2.appendChild(d2nd); body.appendChild(d2);
  }

  // Footer
  var footer=row([
    btn('bg','Cancel',function(){setState({bidLoad:null});},{flex:'1'}),
    btn('bp',existing?'Update Bid':'Submit Bid',submit,{flex:'2'})
  ],{marginTop:'18px',paddingTop:'16px',borderTop:'.5px solid rgba(0,0,0,.08)',gap:'10px'});
  body.appendChild(footer);
  modal.appendChild(body);
  bg.appendChild(modal);
  bg.addEventListener('click',function(e){if(e.target===bg)setState({bidLoad:null});});
  return bg;
}

/* ── Admin ── */
function renderAdmin(){

  var loads=_state.loads;
  var users=store('lb_users')||[];
  var bids=store('lb_bids')||[];
  var pending=users.filter(function(u){return u.status==='pending';});

  var page=div('page',[]);

    {label:'Live Loads',val:loads.length,color:'#BA7517'},

      ]),

        _state.lastRefresh?el('span',{style:{fontSize:'11px',color:'#aaa'}},'Updated '+_state.lastRefresh.toLocaleTimeString()):null,

    page.appendChild(hdr);

    var card=div('card',[]);
    var oa=div('oa',[]);
    var tbl=document.createElement('table');
    var thead=document.createElement('thead'); var hr=document.createElement('tr');

    thead.appendChild(hr); tbl.appendChild(thead);
    var tbody=document.createElement('tbody');
    if(loads.length===0){
      var tr=document.createElement('tr'); var td=document.createElement('td'); td.colSpan=8; td.style.textAlign='center'; td.style.padding='40px'; td.style.color='#888780'; td.textContent=_state.loading?'Loading...':'No loads found.'; tr.appendChild(td); tbody.appendChild(tr);
    } else {
      loads.forEach(function(load){

        function td(c,s){var t=document.createElement('td');if(s)Object.assign(t.style,s);if(typeof c==='string'||typeof c==='number')t.textContent=c;else t.appendChild(c);tr.appendChild(t);}
        var a=document.createElement('a'); a.href=load.link; a.target='_blank'; a.textContent='#'+load.id; a.style.color='#BA7517'; a.style.fontFamily='IBM Plex Mono,monospace'; a.style.fontSize='12px'; a.style.textDecoration='none';
        td(a); td(load.origin,{fontWeight:'500'}); td(load.dest);
        var mc=document.createElement('td');
        var ms=document.createElement('span'); ms.textContent=load.miles.toLocaleString(); ms.style.color=load.isTeam?'#A32D2D':'inherit'; ms.style.fontWeight=load.isTeam?'600':'400'; mc.appendChild(ms);
        if(load.isTeam){var tb=badge('brd','TEAM');tb.style.marginLeft='5px';mc.appendChild(tb);}

      var pt=document.createElement('table'); var ph=document.createElement('thead'); var phr=document.createElement('tr');
      ['Carrier','MC #','Email','Registered',''].forEach(function(h){var th=document.createElement('th');th.textContent=h;phr.appendChild(th);}); ph.appendChild(phr); pt.appendChild(ph);
      var pb=document.createElement('tbody');
      pending.forEach(function(u){
        var tr=document.createElement('tr');
        function td(c,s){var t=document.createElement('td');if(s)Object.assign(t.style,s);if(typeof c==='string')t.textContent=c;else t.appendChild(c);tr.appendChild(t);}

          btn('bp','Approve',function(){approveUser(u.id,'approved');},{padding:'5px 13px',fontSize:'12px'}),

        ]));
        tr.appendChild(ac); pb.appendChild(tr);

        var sc=document.createElement('td'); sc.appendChild(badge(bid.status==='awarded'?'bs':bid.status==='rejected'?'brd':'ba',(bid.status||'pending').toUpperCase())); tr.appendChild(sc);
        var ac=document.createElement('td');
        ac.appendChild(row([
          bid.status!=='awarded'?btn('bp','Award',function(){updateBid(bid.loadId,bid.carrierId,'awarded');},{padding:'4px 10px',fontSize:'12px'}):null,
          bid.status!=='rejected'?btn('bd','Reject',function(){updateBid(bid.loadId,bid.carrierId,'rejected');},{padding:'4px 10px',fontSize:'12px'}):null
        ]));
        tr.appendChild(ac); tb_.appendChild(tr);
      });
      tbl.appendChild(tb_); oa.appendChild(tbl); bc.appendChild(oa); page.appendChild(bc);
    });
  }

  frag.appendChild(page);
  return frag;
}

function approveUser(id,status){
  var users=(store('lb_users')||[]).map(function(u){return u.id===id?Object.assign({},u,{status:status}):u;});
  store('lb_users',users); render();
}
function updateBid(loadId,carrierId,status){
  var bids=(store('lb_bids')||[]).map(function(b){return b.loadId===loadId&&b.carrierId===carrierId?Object.assign({},b,{status:status}):b;});
  store('lb_bids',bids); render();
}

/* ── Refresh ── */
var _refreshTimer=null;
function doRefresh(){
  setState({loading:true,error:''});
  fetchLoads().then(function(loads){
    setState({loads:loads,loading:false,lastRefresh:new Date()});
  }).catch(function(e){
    setState({loading:false,error:'Could not fetch loads: '+e.message});
  });
}

/* ── Boot ── */
window.addEventListener('DOMContentLoaded',function(){
  try{
    var sess=store('lb_sess');
    if(sess&&sess.id){
      _state.session=sess;
      _state.view=sess.role==='admin'?'admin':'board';
    }
    render();
    doRefresh();
    _refreshTimer=setInterval(doRefresh,REFRESH_MS);
  }catch(e){
    document.getElementById('app').innerHTML='<div style="padding:40px;color:#A32D2D;font-family:monospace">Boot error: '+e.message+'</div>';
  }
});
