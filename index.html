<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>USPS Load Board</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@800&family=IBM+Plex+Mono&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#f4f3ef;color:#1a1a18;min-height:100vh}
.logo{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:22px;color:#BA7517;letter-spacing:.06em}
.nav{background:#fff;border-bottom:.5px solid rgba(0,0,0,.1);padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:52px;position:sticky;top:0;z-index:100}
.page{max-width:1200px;margin:0 auto;padding:22px 20px}
.card{background:#fff;border:.5px solid rgba(0,0,0,.09);border-radius:12px;overflow:hidden;margin-bottom:16px}
.sh{display:flex;justify-content:space-between;align-items:center;padding:13px 16px;border-bottom:.5px solid rgba(0,0,0,.08);flex-wrap:wrap;gap:8px}
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:20px}
.sc{background:#ece9e2;border-radius:8px;padding:13px 15px}
.sl{font-size:11px;font-weight:500;color:#888780;text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px}
.sv{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:28px}
.st{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:17px;letter-spacing:.04em}
table{border-collapse:collapse;width:100%}
th{text-align:left;font-size:11px;font-weight:500;color:#888780;text-transform:uppercase;letter-spacing:.07em;padding:9px 14px;border-bottom:.5px solid rgba(0,0,0,.09);white-space:nowrap;background:#fafaf8}
td{padding:10px 14px;font-size:13px;border-bottom:.5px solid rgba(0,0,0,.07);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafaf8}
.oa{overflow-x:auto}
label{display:block;font-size:11px;font-weight:500;color:#888780;margin-bottom:5px;text-transform:uppercase;letter-spacing:.07em}
input,select{width:100%;padding:8px 10px;border:.5px solid rgba(0,0,0,.2);border-radius:8px;background:#fff;color:#1a1a18;font-family:'Inter',sans-serif;font-size:13px;outline:none}
input:focus,select:focus{border-color:#BA7517}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ff{margin-bottom:12px}
.ds{border-top:.5px solid rgba(0,0,0,.09);padding-top:16px;margin-top:8px}
.dl{font-size:11px;font-weight:500;color:#BA7517;text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
button{cursor:pointer;font-family:'Inter',sans-serif;line-height:1;border-radius:8px;font-size:13px;font-weight:500;transition:opacity .15s}
button:hover{opacity:.8}
.bp{background:#BA7517;color:#fff;border:none;padding:9px 18px}
.bo{background:transparent;color:#BA7517;border:.5px solid #BA7517;padding:8px 17px}
.bg{background:transparent;color:#5F5E5A;border:.5px solid rgba(0,0,0,.18);padding:8px 17px}
.bd{background:transparent;color:#A32D2D;border:.5px solid rgba(163,45,45,.4);padding:8px 17px}
.tgl{padding:7px 14px;border-radius:8px;font-size:13px;font-weight:500;border:.5px solid rgba(0,0,0,.15);background:transparent;color:#5F5E5A;cursor:pointer;margin-right:6px}
.tgl.on{border-color:#BA7517;background:rgba(186,117,23,.1);color:#412402}
.badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:4px;font-size:11px;font-weight:500;white-space:nowrap}
.ba{background:rgba(186,117,23,.12);color:#412402;border:.5px solid #BA7517}
.bs{background:rgba(63,109,17,.1);color:#27500A;border:.5px solid rgba(63,109,17,.4)}
.brd{background:rgba(163,45,45,.1);color:#791F1F;border:.5px solid rgba(163,45,45,.4)}
.bi{background:rgba(24,95,165,.1);color:#0C447C;border:.5px solid rgba(24,95,165,.3)}
.err{background:rgba(163,45,45,.08);border:.5px solid rgba(163,45,45,.35);border-radius:8px;padding:9px 13px;color:#791F1F;font-size:13px;margin-bottom:14px}
.ok{background:rgba(63,109,17,.08);border:.5px solid rgba(63,109,17,.35);border-radius:8px;padding:9px 13px;color:#27500A;font-size:13px;margin-bottom:14px}
.tw{background:rgba(163,45,45,.08);border:.5px solid rgba(163,45,45,.35);border-radius:8px;padding:9px 13px;color:#791F1F;font-size:13px;margin-bottom:16px}
.tabs{display:flex;border-bottom:.5px solid rgba(0,0,0,.1);margin-bottom:18px}
.tab{padding:9px 16px;background:none;border:none;border-bottom:2px solid transparent;color:#888780;font-size:13px;font-weight:500;cursor:pointer;margin-bottom:-1px;font-family:'Inter',sans-serif;border-radius:0}
.tab.on{color:#BA7517;border-bottom-color:#BA7517}
.auth-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.auth-card{background:#fff;border:.5px solid rgba(0,0,0,.1);border-radius:14px;width:100%;max-width:420px;overflow:hidden}
.stop-badge{display:inline-block;background:#f4f3ef;border:.5px solid rgba(0,0,0,.12);border-radius:4px;padding:2px 7px;font-size:11px;color:#5F5E5A;margin:2px;font-family:'IBM Plex Mono',monospace}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px}
.modal{background:#fff;border-radius:14px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.dot{width:7px;height:7px;border-radius:50%;background:#3B6D11;display:inline-block;margin-right:5px;animation:pulse 2s infinite}
</style>
</head>
<body>
<div id="app"></div>
<script>
var PROXY = 'https://restless-lab-de0d.biegajpeter.workers.dev';
var ADMIN_EMAIL = 'admin@loadboard.com';
var ADMIN_PASS = 'Admin@2026';
var CHANNEL = 'ben_usps';

function store(k,v){try{if(v===undefined)return JSON.parse(localStorage.getItem(k)||'null');localStorage.setItem(k,JSON.stringify(v));}catch(e){return null;}}

function parseHTML(html){
  var tmp=document.createElement('div');
  tmp.innerHTML=html;
  var msgs=tmp.querySelectorAll('.tgme_widget_message');
  var loads=[],seen={};
  for(var i=0;i<msgs.length;i++){
    var msg=msgs[i];
    var el=msg.querySelector('.tgme_widget_message_text');
    if(!el)continue;
    var txt=el.innerText||el.textContent||'';
    if(txt.indexOf('New Load Bid')<0)continue;
    try{var load=parseLoad(txt,msg);if(load&&!seen[load.id]){seen[load.id]=1;loads.push(load);}}catch(e){}
  }
  loads.sort(function(a,b){return b.ts-a.ts;});
  return loads;
}

function parseLoad(txt,msgEl){
  var idM=txt.match(/New Load Bid[:\s#*`_]+(\d+)/i);
  if(!idM)return null;
  var distM=txt.match(/Distance[:\s*_]+([0-9,]+\.?\d*)\s*miles?/i);
  var pickM=txt.match(/Pickup[:\s*_]+([0-9/]+ [0-9:]+ [APM]+)/i);
  var delM=txt.match(/Delivery[:\s*_]+([0-9/]+ [0-9:]+ [APM]+)/i);
  var stops=[],re=/Stop\s+(\d+)[:\s*_]+([A-Z][A-Z\s]+,\s*[A-Z]{2}\s+\d{5})/gi,m;
  while((m=re.exec(txt))!==null)stops.push({num:parseInt(m[1]),loc:m[2].trim()});
  if(stops.length<2)return null;
  var miles=distM?parseFloat(distM[1].replace(/,/g,'')):0;
  var timeEl=msgEl&&msgEl.querySelector('.tgme_widget_message_date time');
  var linkEl=msgEl&&msgEl.querySelector('a.tgme_widget_message_date');
  return{id:idM[1],miles:miles,origin:stops[0].loc,dest:stops[stops.length-1].loc,stops:stops,pickup:pickM?pickM[1]:'--',delivery:delM?delM[1]:'--',ts:timeEl?new Date(timeEl.getAttribute('datetime')).getTime():Date.now(),link:linkEl?linkEl.href:'https://t.me/'+CHANNEL,isTeam:miles>=500};
}

function fetchLoads(cb){
  fetch(PROXY+'?channel='+CHANNEL)
    .then(function(r){return r.text();})
    .then(function(html){cb(null,parseHTML(html));})
    .catch(function(e){cb(e.message,[]);});
}

var S={view:'auth',session:null,loads:[],loading:false,error:'',lastRefresh:null,bidLoad:null,toast:'',tab:'loads',authTab:'login',authErr:'',authOk:''};
function go(patch){Object.assign(S,patch);draw();}

function mk(tag,attrs,kids){
  var n=document.createElement(tag);
  if(attrs)for(var k in attrs){
    if(k==='cls')n.className=attrs[k];
    else if(k==='style'&&typeof attrs[k]==='object')Object.assign(n.style,attrs[k]);
    else if(k.slice(0,2)==='on')n.addEventListener(k.slice(2),attrs[k]);
    else n.setAttribute(k,attrs[k]);
  }
  if(kids)[].concat(kids).forEach(function(c){
    if(c==null||c===false)return;
    n.appendChild(typeof c==='string'||typeof c==='number'?document.createTextNode(String(c)):c);
  });
  return n;
}
function d(cls,kids,sty){return mk('div',{cls:cls,style:sty||{}},kids);}
function t(txt,sty){var s=mk('span',{style:sty||{}});s.textContent=txt;return s;}
function btn(cls,lbl,fn,sty){return mk('button',{cls:cls,style:sty||{},onclick:fn},lbl);}
function fld(lbl,inp){return d('ff',[mk('label',{},lbl),inp]);}
function inp(p){
  var i=mk('input',{});
  for(var k in p){
    if(k==='oninput')i.addEventListener('input',p[k]);
    else if(k==='onkeydown')i.addEventListener('keydown',p[k]);
    else i[k]=p[k];
  }
  return i;
}
function bdg(cls,txt){return mk('span',{cls:'badge '+cls},txt);}
function row(kids,sty){return d('',kids,Object.assign({display:'flex',alignItems:'center',gap:'8px',flexWrap:'wrap'},sty||{}));}
function cell(tr,c,s){var td=mk('td',{style:s||{}});if(typeof c==='string'||typeof c==='number')td.textContent=c;else td.appendChild(c);tr.appendChild(td);return td;}

function draw(){
  var app=document.getElementById('app');
  app.innerHTML='';
  try{
    if(S.view==='auth')app.appendChild(drawAuth());
    else if(S.view==='board')app.appendChild(drawBoard());
    else if(S.view==='admin')app.appendChild(drawAdmin());
  }catch(e){
    app.innerHTML='<div style="padding:40px;color:#A32D2D;font-family:monospace">Error: '+e.message+'</div>';
  }
}

function drawAuth(){
  var isLogin=S.authTab==='login';
  var carrier='',mc='',email='',pw='',confirm='';

  function doLogin(){
    go({authErr:''});
    if(email.trim()===ADMIN_EMAIL&&pw===ADMIN_PASS){
      var u={id:'__admin',role:'admin',email:ADMIN_EMAIL};
      store('lb_sess',u);go({session:u,view:'admin'});return;
    }
    var users=store('lb_users')||[];
    var u=users.filter(function(u){return u.email.toLowerCase()===email.trim().toLowerCase()&&u.pw===pw;})[0];
    if(!u){go({authErr:'Invalid email or password.'});return;}
    if(u.status==='pending'){go({authErr:'Account pending admin approval.'});return;}
    if(u.status==='denied'){go({authErr:'Account access denied.'});return;}
    store('lb_sess',u);go({session:u,view:'board'});
  }

  function doRegister(){
    go({authErr:''});
    if(!carrier||!mc||!email||!pw){go({authErr:'All fields are required.'});return;}
    if(pw!==confirm){go({authErr:'Passwords do not match.'});return;}
    if(pw.length<6){go({authErr:'Password must be at least 6 characters.'});return;}
    var users=store('lb_users')||[];
    if(users.filter(function(u){return u.email.toLowerCase()===email.trim().toLowerCase();}).length){go({authErr:'Email already registered.'});return;}
    if(users.filter(function(u){return u.mc.trim()===mc.trim();}).length){go({authErr:'MC # already registered.'});return;}
    var user={id:'USR-'+Date.now(),role:'carrier',carrier:carrier.trim(),mc:mc.trim(),email:email.trim(),pw:pw,status:'pending',at:Date.now()};
    store('lb_users',[].concat(users,[user]));
    go({authOk:'Registration submitted! Awaiting admin approval.',authTab:'login',authErr:''});
  }

  var tabRow=d('',[ 
    mk('button',{cls:'tab'+(isLogin?' on':''),style:{flex:'1',padding:'12px 0',textTransform:'uppercase',letterSpacing:'.07em',fontSize:'12px',borderRadius:'0',borderBottom:'2px solid '+(isLogin?'#BA7517':'transparent'),color:isLogin?'#BA7517':'#888780'},onclick:function(){go({authTab:'login',authErr:'',authOk:''});}}, 'Sign In'),
    mk('button',{cls:'tab'+(!isLogin?' on':''),style:{flex:'1',padding:'12px 0',textTransform:'uppercase',letterSpacing:'.07em',fontSize:'12px',borderRadius:'0',borderBottom:'2px solid '+(!isLogin?'#BA7517':'transparent'),color:!isLogin?'#BA7517':'#888780'},onclick:function(){go({authTab:'register',authErr:'',authOk:''});}}, 'Request Access')
  ],{display:'flex',borderBottom:'.5px solid rgba(0,0,0,.09)'});

  var form=d('',null,{padding:'22px'});
  if(S.authErr)form.appendChild(d('err',S.authErr));
  if(S.authOk)form.appendChild(d('ok',S.authOk));

  if(isLogin){
    form.appendChild(fld('Email',inp({type:'email',placeholder:'your@email.com',oninput:function(e){email=e.target.value;}})));
    form.appendChild(fld('Password',inp({type:'password',placeholder:'••••••••',oninput:function(e){pw=e.target.value;},onkeydown:function(e){if(e.key==='Enter')doLogin();}})));
    form.appendChild(btn('bp','Sign In',doLogin,{width:'100%',marginTop:'6px'}));
  }else{
    form.appendChild(fld('Carrier Name',inp({type:'text',placeholder:'ABC Trucking LLC',oninput:function(e){carrier=e.target.value;}})));
    form.appendChild(fld('MC #',inp({type:'text',placeholder:'MC-123456',oninput:function(e){mc=e.target.value;}})));
    form.appendChild(fld('Email',inp({type:'email',placeholder:'dispatch@company.com',oninput:function(e){email=e.target.value;}})));
    form.appendChild(fld('Password',inp({type:'password',placeholder:'Min. 6 characters',oninput:function(e){pw=e.target.value;}})));
    form.appendChild(fld('Confirm Password',inp({type:'password',placeholder:'Re-enter password',oninput:function(e){confirm=e.target.value;}})));
    form.appendChild(btn('bp','Submit Registration',doRegister,{width:'100%',marginTop:'6px'}));
    form.appendChild(mk('p',{style:{fontSize:'11px',color:'#888780',textAlign:'center',marginTop:'10px',lineHeight:'1.6'}},'Account requires admin approval before access.'));
  }

  return d('auth-wrap',[
    d('',[ 
      mk('div',{cls:'logo',style:{fontSize:'30px',marginBottom:'6px',textAlign:'center'}},'USPS LOAD BOARD'),
      mk('div',{style:{fontSize:'12px',color:'#888780',letterSpacing:'.08em',textTransform:'uppercase',textAlign:'center',marginBottom:'24px'}},'Carrier Freight Portal')
    ]),
    d('auth-card',[tabRow,form])
  ]);
}

function drawNav(){
  var sess=S.session;
  return mk('div',{cls:'nav'},[
    mk('span',{cls:'logo'},'USPS LOAD BOARD'),
    row([
      sess.role!=='admin'?t(sess.carrier,{fontSize:'13px',color:'#5F5E5A',marginRight:'4px'}):null,
      sess.role!=='admin'?t(sess.mc,{fontFamily:'IBM Plex Mono,monospace',fontSize:'12px',color:'#BA7517'}):null,
      sess.role==='admin'?mk('span',{style:{fontSize:'12px',color:'#888780',background:'#f4f3ef',padding:'2px 8px',borderRadius:'4px'}},'ADMIN'):null,
      btn('bg','Log Out',function(){store('lb_sess',null);go({session:null,view:'auth',authErr:'',authOk:'',authTab:'login'});},{padding:'6px 12px',fontSize:'12px'})
    ])
  ]);
}

function drawStats(items){
  var g=mk('div',{cls:'sg'});
  items.forEach(function(s){g.appendChild(d('sc',[mk('div',{cls:'sl'},s.label),mk('div',{cls:'sv',style:{color:s.color}},String(s.val))]));});
  return g;
}

function drawBoard(){
  var loads=S.loads;
  var bids=store('lb_bids')||[];
  var myBids=bids.filter(function(b){return b.carrierId===S.session.id;});
  var frag=document.createDocumentFragment();
  frag.appendChild(drawNav());
  var page=d('page');

  if(S.toast){
    var te=d('ok',null,{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'14px'});
    te.appendChild(t(S.toast));
    te.appendChild(btn('','×',function(){go({toast:''});},{background:'none',border:'none',color:'#27500A',fontSize:'18px',cursor:'pointer'}));
    page.appendChild(te);
  }

  page.appendChild(drawStats([
    {label:'Live Loads',val:loads.length,color:'#BA7517'},
    {label:'Team Required',val:loads.filter(function(l){return l.isTeam;}).length,color:'#A32D2D'},
    {label:'My Bids',val:myBids.length,color:'#3B6D11'},
    {label:'Awarded',val:myBids.filter(function(b){return b.status==='awarded';}).length,color:'#185FA5'}
  ]));

  var card=d('card');
  card.appendChild(d('sh',[
    row([
      mk('span',{cls:'st'},'Available Loads'),
      S.loading?t(' Refreshing...',{fontSize:'12px',color:'#888780',marginLeft:'8px'}):mk('span',{style:{fontSize:'11px',color:'#888780',marginLeft:'8px'}},[mk('span',{cls:'dot'}),loads.length+' loads'])
    ]),
    row([
      S.lastRefresh?t('Updated '+S.lastRefresh.toLocaleTimeString(),{fontSize:'11px',color:'#aaa'}):null,
      btn('bg','Refresh',doRefresh,{padding:'5px 12px',fontSize:'12px'})
    ])
  ]));

  if(S.error)card.appendChild(d('err',S.error,{margin:'12px 16px'}));

  var oa=d('oa');
  var tbl=mk('table');
  var thead=mk('thead');var hr=mk('tr');
  ['Load #','Origin','Destination','Miles','Pickup','Delivery','',''].forEach(function(h){hr.appendChild(mk('th',{},h));});
  thead.appendChild(hr);tbl.appendChild(thead);
  var tbody=mk('tbody');
  if(!loads.length){
    var tr=mk('tr');var td=mk('td',{colspan:'8',style:{textAlign:'center',padding:'48px',color:'#888780'}},'No loads yet — click Refresh.');tr.appendChild(td);tbody.appendChild(tr);
  }else{
    loads.forEach(function(load){
      var mb=myBids.filter(function(b){return b.loadId===load.id;})[0];
      var tr=mk('tr');
      var a=mk('a',{href:load.link,target:'_blank',style:{color:'#BA7517',fontFamily:'IBM Plex Mono,monospace',fontSize:'12px',textDecoration:'none'}},'#'+load.id);
      cell(tr,a);
      cell(tr,load.origin,{fontWeight:'500'});
      cell(tr,load.dest);
      var mc2=mk('td');
      mc2.appendChild(t(load.miles.toLocaleString(),{color:load.isTeam?'#A32D2D':'inherit',fontWeight:load.isTeam?'600':'400'}));
      if(load.isTeam){var tb3=bdg('brd','TEAM');tb3.style.marginLeft='5px';mc2.appendChild(tb3);}
      tr.appendChild(mc2);
      cell(tr,load.pickup,{fontFamily:'IBM Plex Mono,monospace',fontSize:'11px'});
      cell(tr,load.delivery,{fontFamily:'IBM Plex Mono,monospace',fontSize:'11px'});
      var sc=mk('td');sc.appendChild(mb?bdg('bs','BID PLACED'):bdg('ba','OPEN'));tr.appendChild(sc);
      var ac=mk('td');
      (function(l){ac.appendChild(btn(mb?'bo':'bp',mb?'Edit':'Bid',function(){go({bidLoad:l});},{padding:'5px 12px',fontSize:'12px'}));})(load);
      tr.appendChild(ac);
      tbody.appendChild(tr);
    });
  }
  tbl.appendChild(tbody);oa.appendChild(tbl);card.appendChild(oa);
  page.appendChild(card);

  if(myBids.length){
    var bc=d('card');
    bc.appendChild(d('sh',[mk('span',{cls:'st'},'My Bids')]));
    var boa=d('oa');var bt=mk('table');var bh=mk('thead');var bhr=mk('tr');
    ['Load #','Route','Rate','ETA','Driver(s)','Status'].forEach(function(h){bhr.appendChild(mk('th',{},h));});
    bh.appendChild(bhr);bt.appendChild(bh);
    var btb=mk('tbody');
    myBids.forEach(function(bid){
      var ld=loads.filter(function(l){return l.id===bid.loadId;})[0];
      var tr=mk('tr');
      cell(tr,'#'+bid.loadId,{fontFamily:'IBM Plex Mono,monospace',color:'#BA7517',fontSize:'12px'});
      cell(tr,ld?ld.origin+' -> '+ld.dest:'--');
      cell(tr,'$'+Number(bid.rate||0).toLocaleString(),{fontFamily:'IBM Plex Mono,monospace',color:'#3B6D11',fontSize:'12px'});
      cell(tr,bid.eta,{fontFamily:'IBM Plex Mono,monospace',fontSize:'11px'});
      cell(tr,bid.d1n+(bid.d2n?' / '+bid.d2n:''),{fontSize:'12px'});
      var sc=mk('td');sc.appendChild(bdg(bid.status==='awarded'?'bs':bid.status==='rejected'?'brd':'ba',(bid.status||'pending').toUpperCase()));tr.appendChild(sc);
      btb.appendChild(tr);
    });
    bt.appendChild(btb);boa.appendChild(bt);bc.appendChild(boa);page.appendChild(bc);
  }

  frag.appendChild(page);
  if(S.bidLoad)frag.appendChild(drawBidModal());
  return frag;
}

function drawBidModal(){
  var load=S.bidLoad,sess=S.session;
  var isTeam=load.miles>=500;
  var bids=store('lb_bids')||[];
  var existing=bids.filter(function(b){return b.loadId===load.id&&b.carrierId===sess.id;})[0];
  var f=existing?Object.assign({},existing):{rate:'',eta:'',d1n:'',d1p:'',d1nd:false,d2n:'',d2p:'',d2nd:false};

  function submit(){
    if(!f.rate||!f.eta||!f.d1n||!f.d1p){alert('Complete all required fields.');return;}
    if(isTeam&&(!f.d2n||!f.d2p)){alert('Team load: both drivers required.');return;}
    var bid=Object.assign({},f,{loadId:load.id,carrierId:sess.id,carrierName:sess.carrier,mc:sess.mc,status:'pending',at:Date.now()});
    var all=(store('lb_bids')||[]).filter(function(b){return!(b.loadId===load.id&&b.carrierId===sess.id);});
    store('lb_bids',[].concat(all,[bid]));
    go({bidLoad:null,toast:'Bid submitted for load #'+load.id});
  }

  var bg=d('modal-bg');
  var modal=d('modal');

  var mh=d('',null,{padding:'16px 20px',borderBottom:'.5px solid rgba(0,0,0,.09)',display:'flex',justifyContent:'space-between',alignItems:'center'});
  mh.appendChild(d('',[
    mk('div',{style:{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:'800',fontSize:'20px'}},'Place Bid -- #'+load.id),
    mk('div',{style:{fontSize:'12px',color:'#888780',marginTop:'2px'}},load.origin+' -> '+load.dest+' - '+load.miles.toLocaleString()+' mi')
  ]));
  mh.appendChild(btn('','x',function(){go({bidLoad:null});},{background:'none',border:'none',fontSize:'22px',color:'#888780',cursor:'pointer'}));
  modal.appendChild(mh);

  var body=d('',null,{padding:'20px'});
  if(isTeam)body.appendChild(d('tw','Team load ('+load.miles.toLocaleString()+' mi) -- info required for both drivers.'));

  var rr=mk('div',{cls:'fg'});
  rr.appendChild(fld('All-In Rate ($)',inp({type:'number',placeholder:'0',value:f.rate,oninput:function(e){f.rate=e.target.value;}})));
  rr.appendChild(fld('ETA to Destination',inp({type:'date',value:f.eta,oninput:function(e){f.eta=e.target.value;}})));
  body.appendChild(rr);

  function driverBlock(label,pre,color){
    var blk=d('ds');
    blk.appendChild(mk('div',{cls:'dl',style:color?{color:color}:{}},'Driver '+label));
    var dr=mk('div',{cls:'fg'});
    dr.appendChild(fld('Full Name',inp({type:'text',placeholder:'Full Name',value:f[pre+'n']||'',oninput:function(e){f[pre+'n']=e.target.value;}})));
    dr.appendChild(fld('Phone Number',inp({type:'tel',placeholder:'(555) 000-0000',value:f[pre+'p']||'',oninput:function(e){f[pre+'p']=e.target.value;}})));
    blk.appendChild(dr);
    var yes=mk('button',{cls:'tgl'+(f[pre+'nd']===true?' on':'')},'Yes');
    var no=mk('button',{cls:'tgl'+(f[pre+'nd']!==true?' on':'')},'No');
    yes.addEventListener('click',function(){f[pre+'nd']=true;yes.className='tgl on';no.className='tgl';});
    no.addEventListener('click',function(){f[pre+'nd']=false;yes.className='tgl';no.className='tgl on';});
    blk.appendChild(fld('CDL Non-Domiciled?',d('',{style:{display:'flex',gap:'8px'}},[yes,no])));
    return blk;
  }

  body.appendChild(driverBlock('1','d1',null));
  if(isTeam)body.appendChild(driverBlock('2 (Team)','d2','#185FA5'));

  var footer=d('',null,{display:'flex',gap:'10px',marginTop:'18px',paddingTop:'16px',borderTop:'.5px solid rgba(0,0,0,.08)'});
  footer.appendChild(btn('bg','Cancel',function(){go({bidLoad:null});},{flex:'1'}));
  footer.appendChild(btn('bp',existing?'Update Bid':'Submit Bid',submit,{flex:'2'}));
  body.appendChild(footer);
  modal.appendChild(body);
  bg.appendChild(modal);
  bg.addEventListener('click',function(e){if(e.target===bg)go({bidLoad:null});});
  return bg;
}

function drawAdmin(){
  var loads=S.loads,tab=S.tab;
  var users=store('lb_users')||[];
  var bids=store('lb_bids')||[];
  var pending=users.filter(function(u){return u.status==='pending';});
  var frag=document.createDocumentFragment();
  frag.appendChild(drawNav());
  var page=d('page');

  page.appendChild(drawStats([
    {label:'Live Loads',val:loads.length,color:'#BA7517'},
    {label:'Team Required',val:loads.filter(function(l){return l.isTeam;}).length,color:'#A32D2D'},
    {label:'Carriers',val:users.length,color:'#185FA5'},
    {label:'Pending',val:pending.length,color:pending.length>0?'#A32D2D':'#888780'}
  ]));

  var tabs=d('tabs');
  [{id:'loads',label:'Live Loads',b:loads.length},{id:'carriers',label:'Carriers',b:pending.length>0?pending.length+' pending':users.length},{id:'bids',label:'Bids',b:bids.length}]
  .forEach(function(t){
    var tb=mk('button',{cls:'tab'+(tab===t.id?' on':''),onclick:function(){go({tab:t.id});}},t.label);
    tb.appendChild(mk('span',{style:{fontSize:'11px',background:'rgba(0,0,0,.07)',padding:'1px 7px',borderRadius:'10px',marginLeft:'6px'}},String(t.b)));
    tabs.appendChild(tb);
  });
  page.appendChild(tabs);

  if(tab==='loads'){
    var hrow=d('',null,{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'12px',flexWrap:'wrap',gap:'8px'});
    hrow.appendChild(t(S.loading?'Fetching...':'Live from @'+CHANNEL+' - auto-refreshes every 2 min',{fontSize:'12px',color:'#888780'}));
    var rrow=d('',null,{display:'flex',gap:'8px',alignItems:'center'});
    if(S.lastRefresh)rrow.appendChild(t('Updated '+S.lastRefresh.toLocaleTimeString(),{fontSize:'11px',color:'#aaa'}));
    rrow.appendChild(btn('bp','Refresh Now',doRefresh,{fontSize:'12px',padding:'6px 14px'}));
    hrow.appendChild(rrow);
    page.appendChild(hrow);
    if(S.error)page.appendChild(d('err',S.error,{marginBottom:'12px'}));
    var card=d('card');var oa=d('oa');var tbl=mk('table');
    var th=mk('thead');var hr=mk('tr');
    ['Load #','Origin','Destination','Miles','Pickup','Delivery','Stops','Bids'].forEach(function(h){hr.appendChild(mk('th',{},h));});
    th.appendChild(hr);tbl.appendChild(th);
    var tb2=mk('tbody');
    if(!loads.length){
      var tr=mk('tr');var td=mk('td',{colspan:'8',style:{textAlign:'center',padding:'40px',color:'#888780'}},S.loading?'Loading...':'No loads found.');tr.appendChild(td);tb2.appendChild(tr);
    }else{
      loads.forEach(function(load){
        var tr=mk('tr');
        cell(tr,mk('a',{href:load.link,target:'_blank',style:{color:'#BA7517',fontFamily:'IBM Plex Mono,monospace',fontSize:'12px',textDecoration:'none'}},'#'+load.id));
        cell(tr,load.origin,{fontWeight:'500'});cell(tr,load.dest);
        var mc2=mk('td');
        mc2.appendChild(t(load.miles.toLocaleString(),{color:load.isTeam?'#A32D2D':'inherit',fontWeight:load.isTeam?'600':'400'}));
        if(load.isTeam){var tbt=bdg('brd','TEAM');tbt.style.marginLeft='5px';mc2.appendChild(tbt);}
        tr.appendChild(mc2);
        cell(tr,load.pickup,{fontFamily:'IBM Plex Mono,monospace',fontSize:'11px'});
        cell(tr,load.delivery,{fontFamily:'IBM Plex Mono,monospace',fontSize:'11px'});
        var sc=mk('td');load.stops.forEach(function(s){sc.appendChild(mk('span',{cls:'stop-badge'},s.loc));});tr.appendChild(sc);
        cell(tr,String(bids.filter(function(b){return b.loadId===load.id;}).length),{fontFamily:'IBM Plex Mono,monospace',fontSize:'12px'});
        tb2.appendChild(tr);
      });
    }
    tbl.appendChild(tb2);oa.appendChild(tbl);card.appendChild(oa);page.appendChild(card);
  }

  if(tab==='carriers'){
    if(pending.length){
      var pc=d('card');pc.style.borderColor='rgba(163,45,45,.4)';
      pc.appendChild(d('sh',[mk('span',{cls:'st',style:{color:'#A32D2D'}},'Pending Approval'),bdg('brd',String(pending.length))]));
      var pt=mk('table');var ph=mk('thead');var phr=mk('tr');
      ['Carrier','MC #','Email','Registered',''].forEach(function(h){phr.appendChild(mk('th',{},h));});
      ph.appendChild(phr);pt.appendChild(ph);
      var pb=mk('tbody');
      pending.forEach(function(u){
        var tr=mk('tr');
        cell(tr,u.carrier,{fontWeight:'500'});
        cell(tr,u.mc,{fontFamily:'IBM Plex Mono,monospace',color:'#BA7517'});
        cell(tr,u.email);
        cell(tr,new Date(u.at).toLocaleDateString());
        var ac=mk('td');
        (function(uid){
          ac.appendChild(btn('bp','Approve',function(){approveUser(uid,'approved');},{padding:'5px 13px',fontSize:'12px',marginRight:'6px'}));
          ac.appendChild(btn('bd','Deny',function(){approveUser(uid,'denied');},{padding:'5px 13px',fontSize:'12px'}));
        })(u.id);
        tr.appendChild(ac);pb.appendChild(tr);
      });
      pt.appendChild(pb);pc.appendChild(pt);page.appendChild(pc);
    }
    var ac2=d('card');
    ac2.appendChild(d('sh',[mk('span',{cls:'st'},'All Carriers'),bdg('bs',String(users.length))]));
    var at=mk('table');var ah=mk('thead');var ahr=mk('tr');
    ['Carrier','MC #','Email','Status','Bids',''].forEach(function(h){ahr.appendChild(mk('th',{},h));});
    ah.appendChild(ahr);at.appendChild(ah);
    var ab=mk('tbody');
    if(!users.length){var tr=mk('tr');var td=mk('td',{colspan:'6',style:{textAlign:'center',padding:'40px',color:'#888780'}},'No carriers yet.');tr.appendChild(td);ab.appendChild(tr);}
    else users.forEach(function(u){
      var tr=mk('tr');
      cell(tr,u.carrier,{fontWeight:'500'});
      cell(tr,u.mc,{fontFamily:'IBM Plex Mono,monospace',color:'#BA7517'});
      cell(tr,u.email);
      var sc=mk('td');sc.appendChild(bdg(u.status==='approved'?'bs':u.status==='denied'?'brd':'ba',u.status.toUpperCase()));tr.appendChild(sc);
      cell(tr,String(bids.filter(function(b){return b.carrierId===u.id;}).length),{fontFamily:'IBM Plex Mono,monospace',fontSize:'12px'});
      var btns=mk('td');
      (function(uid,ust){
        if(ust!=='approved')btns.appendChild(btn('bo','Approve',function(){approveUser(uid,'approved');},{padding:'4px 10px',fontSize:'12px',marginRight:'6px'}));
        if(ust!=='denied')btns.appendChild(btn('bd','Revoke',function(){approveUser(uid,'denied');},{padding:'4px 10px',fontSize:'12px'}));
      })(u.id,u.status);
      tr.appendChild(btns);ab.appendChild(tr);
    });
    at.appendChild(ab);ac2.appendChild(at);page.appendChild(ac2);
  }

  if(tab==='bids'){
    if(!bids.length)page.appendChild(d('card','No bids yet.',{padding:'48px',textAlign:'center',color:'#888780'}));
    loads.filter(function(l){return bids.some(function(b){return b.loadId===l.id;});}).forEach(function(load){
      var lb=bids.filter(function(b){return b.loadId===load.id;});
      var card2=d('card',null,{marginBottom:'14px'});
      card2.appendChild(d('sh',[
        d('',null,{display:'flex',alignItems:'center',gap:'10px',flexWrap:'wrap'}).appendChild(t('#'+load.id+' '+load.origin+' -> '+load.dest+' ('+load.miles.toLocaleString()+' mi)',{fontSize:'14px',fontWeight:'500'})),
        bdg('bi',lb.length+' bid'+(lb.length!==1?'s':''))
      ]));
      var oa2=d('oa');var tbl2=mk('table');var th2=mk('thead');var hr2=mk('tr');
      ['Carrier','MC #','Rate','ETA','Driver 1','Driver 2','Status',''].forEach(function(h){hr2.appendChild(mk('th',{},h));});
      th2.appendChild(hr2);tbl2.appendChild(th2);
      var tb3=mk('tbody');
      lb.forEach(function(bid){
        var tr=mk('tr');
        cell(tr,bid.carrierName,{fontWeight:'500'});
        cell(tr,bid.mc,{fontFamily:'IBM Plex Mono,monospace',color:'#BA7517'});
        cell(tr,'$'+Number(bid.rate||0).toLocaleString(),{fontFamily:'IBM Plex Mono,monospace',color:'#3B6D11',fontSize:'12px'});
        cell(tr,bid.eta,{fontFamily:'IBM Plex Mono,monospace',fontSize:'11px'});
        cell(tr,bid.d1n+' '+bid.d1p+(bid.d1nd?' [Non-Dom]':''),{fontSize:'12px'});
        cell(tr,bid.d2n?bid.d2n+' '+bid.d2p+(bid.d2nd?' [Non-Dom]':''):'--',{fontSize:'12px'});
        var sc=mk('td');sc.appendChild(bdg(bid.status==='awarded'?'bs':bid.status==='rejected'?'brd':'ba',(bid.status||'pending').toUpperCase()));tr.appendChild(sc);
        var ac=mk('td');
        (function(lid,cid){
          if(bid.status!=='awarded')ac.appendChild(btn('bp','Award',function(){updateBid(lid,cid,'awarded');},{padding:'4px 10px',fontSize:'12px',marginRight:'6px'}));
          if(bid.status!=='rejected')ac.appendChild(btn('bd','Reject',function(){updateBid(lid,cid,'rejected');},{padding:'4px 10px',fontSize:'12px'}));
        })(bid.loadId,bid.carrierId);
        tr.appendChild(ac);tb3.appendChild(tr);
      });
      tbl2.appendChild(tb3);oa2.appendChild(tbl2);card2.appendChild(oa2);page.appendChild(card2);
    });
  }

  frag.appendChild(page);
  return frag;
}

function approveUser(id,status){
  var u=(store('lb_users')||[]).map(function(u){return u.id===id?Object.assign({},u,{status:status}):u;});
  store('lb_users',u);draw();
}
function updateBid(loadId,carrierId,status){
  var b=(store('lb_bids')||[]).map(function(b){return b.loadId===loadId&&b.carrierId===carrierId?Object.assign({},b,{status:status}):b;});
  store('lb_bids',b);draw();
}

var _timer=null;
function doRefresh(){
  go({loading:true,error:''});
  fetchLoads(function(err,loads){
    go({loads:loads||[],loading:false,lastRefresh:new Date(),error:err?'Could not load data: '+err:''});
  });
}

// Boot -- show UI immediately, fetch in background
var sess=store('lb_sess');
if(sess&&sess.id){S.session=sess;S.view=sess.role==='admin'?'admin':'board';}
draw();
doRefresh();
_timer=setInterval(doRefresh,120000);
</script>
</body>
</html>
