<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>USPS Load Board</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ── DESIGN TOKENS ─────────────────────────────────────────── */
:root {
  --ac: #F5A623;
  --ac2: #E8870A;
  --danger: #E85D3F;
  --success: #3CB97A;
  --info: #4A9EE8;
  --radius: 10px;
  --radius-sm: 6px;
  --font-display: 'Syne', sans-serif;
  --font-mono: 'Space Mono', monospace;
  --font-body: 'DM Sans', sans-serif;
  transition: background .25s, color .25s;
}
[data-theme="dark"] {
  --bg: #0D0D0F;
  --bg2: #141417;
  --bg3: #1C1C21;
  --bg4: #242429;
  --border: rgba(255,255,255,.07);
  --border2: rgba(255,255,255,.12);
  --text: #F0EFE8;
  --text2: #9997A0;
  --text3: #6B6970;
  --glow: rgba(245,166,35,.15);
}
[data-theme="light"] {
  --bg: #F5F3EE;
  --bg2: #EDEAE3;
  --bg3: #FFFFFF;
  --bg4: #F0EDE6;
  --border: rgba(0,0,0,.08);
  --border2: rgba(0,0,0,.14);
  --text: #1A1814;
  --text2: #6B6560;
  --text3: #9D9890;
  --glow: rgba(245,166,35,.12);
}

/* ── BASE ──────────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;scroll-behavior:smooth}
body{
  font-family:var(--font-body);
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  transition:background .25s,color .25s;
}

/* ── NAV ───────────────────────────────────────────────────── */
.nav{
  background:var(--bg2);
  border-bottom:1px solid var(--border);
  padding:0 24px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  height:56px;
  position:sticky;
  top:0;
  z-index:100;
  backdrop-filter:blur(12px);
}
.nav-left{display:flex;align-items:center;gap:16px}
.logo{
  font-family:var(--font-display);
  font-weight:800;
  font-size:18px;
  color:var(--ac);
  letter-spacing:.04em;
  text-transform:uppercase;
}
.logo-sub{
  font-family:var(--font-mono);
  font-size:9px;
  color:var(--text3);
  letter-spacing:.12em;
  text-transform:uppercase;
  display:block;
  margin-top:-2px;
}
.nav-pill{
  background:var(--bg3);
  border:1px solid var(--border);
  border-radius:20px;
  padding:3px 10px;
  font-family:var(--font-mono);
  font-size:10px;
  color:var(--text2);
  letter-spacing:.06em;
}
.nav-right{display:flex;align-items:center;gap:10px}
.carrier-tag{
  font-family:var(--font-mono);
  font-size:11px;
  color:var(--text2);
  background:var(--bg3);
  border:1px solid var(--border);
  border-radius:20px;
  padding:4px 12px;
}
.carrier-tag strong{color:var(--ac);font-weight:700}

/* ── THEME TOGGLE ──────────────────────────────────────────── */
.theme-toggle{
  width:38px;height:22px;
  background:var(--bg4);
  border:1px solid var(--border2);
  border-radius:11px;
  position:relative;
  cursor:pointer;
  transition:background .2s;
  flex-shrink:0;
}
.theme-toggle::after{
  content:'';
  position:absolute;
  top:3px;left:3px;
  width:14px;height:14px;
  border-radius:50%;
  background:var(--ac);
  transition:transform .2s;
}
[data-theme="light"] .theme-toggle::after{transform:translateX(16px);}
.theme-icon{font-size:11px;position:absolute;top:50%;transform:translateY(-50%);pointer-events:none;}
.theme-icon.moon{left:5px;opacity:.5;}
.theme-icon.sun{right:5px;opacity:.5;}
[data-theme="light"] .theme-icon.moon{opacity:.5;}
[data-theme="light"] .theme-icon.sun{opacity:1;}

/* ── PAGE ──────────────────────────────────────────────────── */
.page{max-width:1280px;margin:0 auto;padding:24px 20px}

/* ── STATS ─────────────────────────────────────────────────── */
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:24px}
.sc{
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:16px 18px;
  position:relative;
  overflow:hidden;
}
.sc::before{
  content:'';
  position:absolute;
  top:0;left:0;right:0;
  height:2px;
  background:var(--ac);
  opacity:.4;
}
.sc.danger::before{background:var(--danger);}
.sc.success::before{background:var(--success);}
.sc.info::before{background:var(--info);}
.sl{font-family:var(--font-mono);font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px}
.sv{font-family:var(--font-display);font-weight:800;font-size:32px;color:var(--text);line-height:1}

/* ── CARD ──────────────────────────────────────────────────── */
.card{
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:var(--radius);
  overflow:hidden;
  margin-bottom:16px;
}
.card-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 18px;
  border-bottom:1px solid var(--border);
  flex-wrap:wrap;
  gap:10px;
  background:var(--bg3);
}
.card-title{
  font-family:var(--font-display);
  font-weight:800;
  font-size:15px;
  letter-spacing:.03em;
  color:var(--text);
  text-transform:uppercase;
}

/* ── TABLE ─────────────────────────────────────────────────── */
table{border-collapse:collapse;width:100%}
th{
  text-align:left;
  font-family:var(--font-mono);
  font-size:9px;
  font-weight:700;
  color:var(--text3);
  text-transform:uppercase;
  letter-spacing:.1em;
  padding:10px 16px;
  border-bottom:1px solid var(--border);
  white-space:nowrap;
  background:var(--bg3);
}
td{
  padding:12px 16px;
  font-size:13px;
  border-bottom:1px solid var(--border);
  color:var(--text);
  vertical-align:middle;
  transition:background .1s;
}
tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--bg3)}
.oa{overflow-x:auto}

/* ── FORMS ─────────────────────────────────────────────────── */
label{
  display:block;
  font-family:var(--font-mono);
  font-size:9px;
  font-weight:700;
  color:var(--text3);
  text-transform:uppercase;
  letter-spacing:.1em;
  margin-bottom:6px;
}
input,select{
  width:100%;
  padding:9px 12px;
  border:1px solid var(--border2);
  border-radius:var(--radius-sm);
  background:var(--bg3);
  color:var(--text);
  font-family:var(--font-body);
  font-size:13px;
  outline:none;
  transition:border-color .15s,box-shadow .15s;
}
input:focus,select:focus{
  border-color:var(--ac);
  box-shadow:0 0 0 3px var(--glow);
}
.ff{margin-bottom:13px}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.ds{border-top:1px solid var(--border);padding-top:16px;margin-top:12px}
.dl{
  font-family:var(--font-mono);
  font-size:9px;
  font-weight:700;
  color:var(--ac);
  text-transform:uppercase;
  letter-spacing:.1em;
  margin-bottom:12px;
}

/* ── BUTTONS ───────────────────────────────────────────────── */
button{cursor:pointer;font-family:var(--font-body);line-height:1;border-radius:var(--radius-sm);font-size:13px;font-weight:600;transition:all .15s}
button:hover{opacity:.85;transform:translateY(-1px)}
button:active{transform:translateY(0)}
.bp{background:var(--ac);color:#000;border:none;padding:9px 18px}
.bo{background:transparent;color:var(--ac);border:1px solid var(--ac);padding:8px 17px}
.bg{background:transparent;color:var(--text2);border:1px solid var(--border2);padding:8px 17px}
.bd{background:transparent;color:var(--danger);border:1px solid rgba(232,93,63,.4);padding:8px 17px}
.bs2{background:transparent;color:var(--success);border:1px solid rgba(60,185,122,.4);padding:8px 17px}

/* ── TOGGLE PILLS ──────────────────────────────────────────── */
.tg{display:flex;gap:6px;flex-wrap:wrap}
.tgl{
  padding:7px 14px;
  border-radius:20px;
  font-size:12px;
  font-weight:600;
  border:1px solid var(--border2);
  background:transparent;
  color:var(--text2);
  cursor:pointer;
  transition:all .15s;
}
.tgl.on{border-color:var(--ac);background:rgba(245,166,35,.15);color:var(--ac);}

/* ── BADGES ────────────────────────────────────────────────── */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-family:var(--font-mono);font-size:9px;font-weight:700;white-space:nowrap;letter-spacing:.05em;text-transform:uppercase}
.ba{background:rgba(245,166,35,.15);color:var(--ac);border:1px solid rgba(245,166,35,.3)}
.bs{background:rgba(60,185,122,.12);color:var(--success);border:1px solid rgba(60,185,122,.3)}
.brd{background:rgba(232,93,63,.12);color:var(--danger);border:1px solid rgba(232,93,63,.3)}
.bi{background:rgba(74,158,232,.12);color:var(--info);border:1px solid rgba(74,158,232,.3)}
.bgr{background:var(--bg4);color:var(--text2);border:1px solid var(--border2)}

/* ── ALERTS ────────────────────────────────────────────────── */
.err{background:rgba(232,93,63,.1);border:1px solid rgba(232,93,63,.3);border-radius:var(--radius-sm);padding:10px 14px;color:var(--danger);font-size:13px;margin-bottom:14px}
.ok{background:rgba(60,185,122,.1);border:1px solid rgba(60,185,122,.3);border-radius:var(--radius-sm);padding:10px 14px;color:var(--success);font-size:13px;margin-bottom:14px}
.tw{background:rgba(232,93,63,.1);border:1px solid rgba(232,93,63,.3);border-radius:var(--radius-sm);padding:10px 14px;color:var(--danger);font-size:13px;margin-bottom:16px}
.info-box{background:rgba(74,158,232,.1);border:1px solid rgba(74,158,232,.3);border-radius:var(--radius-sm);padding:10px 14px;color:var(--info);font-size:13px;margin-bottom:14px}

/* ── TABS ──────────────────────────────────────────────────── */
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:20px;gap:2px}
.tab{
  padding:10px 18px;
  background:none;border:none;
  border-bottom:2px solid transparent;
  color:var(--text3);
  font-family:var(--font-mono);
  font-size:10px;
  font-weight:700;
  letter-spacing:.08em;
  text-transform:uppercase;
  cursor:pointer;
  margin-bottom:-1px;
  border-radius:0;
  transition:color .15s,border-color .15s;
}
.tab.on{color:var(--ac);border-bottom-color:var(--ac)}

/* ── AUTH ──────────────────────────────────────────────────── */
.auth-wrap{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:24px;
  background:var(--bg);
  position:relative;
  overflow:hidden;
}
.auth-wrap::before{
  content:'USPS LOAD BOARD';
  position:absolute;
  font-family:var(--font-display);
  font-weight:800;
  font-size:18vw;
  color:var(--text);
  opacity:.018;
  white-space:nowrap;
  pointer-events:none;
  letter-spacing:-.02em;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  user-select:none;
}
.auth-card{
  background:var(--bg2);
  border:1px solid var(--border2);
  border-radius:14px;
  width:100%;max-width:440px;
  overflow:hidden;
  position:relative;
  z-index:1;
  box-shadow:0 24px 80px rgba(0,0,0,.35);
}
.auth-top{
  padding:32px 32px 24px;
  border-bottom:1px solid var(--border);
  background:var(--bg3);
  text-align:center;
}
.auth-logo{
  font-family:var(--font-display);
  font-weight:800;
  font-size:26px;
  color:var(--ac);
  letter-spacing:.04em;
  text-transform:uppercase;
  margin-bottom:4px;
}
.auth-sub{
  font-family:var(--font-mono);
  font-size:9px;
  color:var(--text3);
  letter-spacing:.14em;
  text-transform:uppercase;
}
.auth-tabs{display:flex;border-bottom:1px solid var(--border);}
.auth-tab{
  flex:1;padding:12px;
  background:none;border:none;border-bottom:2px solid transparent;
  color:var(--text3);
  font-family:var(--font-mono);font-size:9px;font-weight:700;
  letter-spacing:.1em;text-transform:uppercase;
  cursor:pointer;border-radius:0;transition:all .15s;
}
.auth-tab.on{color:var(--ac);border-bottom-color:var(--ac)}
.auth-form{padding:24px 28px}

/* ── TIMER ─────────────────────────────────────────────────── */
.timer{
  display:inline-flex;align-items:center;gap:4px;
  font-family:var(--font-mono);font-size:10px;font-weight:700;
  padding:3px 8px;border-radius:4px;white-space:nowrap;
}
.timer-ok{background:rgba(60,185,122,.12);color:var(--success);border:1px solid rgba(60,185,122,.25)}
.timer-warn{background:rgba(245,166,35,.12);color:var(--ac);border:1px solid rgba(245,166,35,.3)}
.timer-urgent{background:rgba(232,93,63,.12);color:var(--danger);border:1px solid rgba(232,93,63,.3);animation:urgentPulse 1s infinite}
@keyframes urgentPulse{0%,100%{opacity:1}50%{opacity:.6}}

/* ── BID INFO ──────────────────────────────────────────────── */
.low-bid{
  display:inline-flex;align-items:center;gap:5px;
  font-family:var(--font-mono);font-size:10px;font-weight:700;
  padding:3px 8px;border-radius:4px;
  background:rgba(60,185,122,.1);color:var(--success);
  border:1px solid rgba(60,185,122,.25);
  white-space:nowrap;
}
.no-bid{
  display:inline-flex;align-items:center;
  font-family:var(--font-mono);font-size:10px;
  padding:3px 8px;border-radius:4px;
  background:var(--bg4);color:var(--text3);
  border:1px solid var(--border);
  white-space:nowrap;
}

/* ── FILTER BAR ────────────────────────────────────────────── */
.filter-bar{
  display:flex;gap:8px;flex-wrap:wrap;align-items:center;
  padding:12px 18px;
  border-bottom:1px solid var(--border);
  background:var(--bg);
}
.fi{
  border:1px solid var(--border2);
  border-radius:var(--radius-sm);
  padding:7px 10px;
  font-size:12px;
  font-family:var(--font-body);
  outline:none;
  background:var(--bg3);
  color:var(--text);
  width:auto;
}
.fi:focus{border-color:var(--ac)}

/* ── MODAL ─────────────────────────────────────────────────── */
.modal-bg{
  position:fixed;inset:0;
  background:rgba(0,0,0,.7);
  display:flex;align-items:center;justify-content:center;
  z-index:200;padding:16px;
  backdrop-filter:blur(4px);
}
.modal{
  background:var(--bg2);
  border:1px solid var(--border2);
  border-radius:14px;
  width:100%;max-width:580px;
  max-height:90vh;overflow-y:auto;
  box-shadow:0 32px 80px rgba(0,0,0,.4);
}
.modal-header{
  padding:18px 22px;
  border-bottom:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:flex-start;
  background:var(--bg3);
}
.modal-title{
  font-family:var(--font-display);
  font-weight:800;
  font-size:17px;
  color:var(--text);
  text-transform:uppercase;
  letter-spacing:.03em;
}
.modal-sub{font-size:12px;color:var(--text2);margin-top:3px;font-family:var(--font-mono)}
.modal-body{padding:22px}

/* ── MISC ──────────────────────────────────────────────────── */
.stop-badge{
  display:inline-block;
  background:var(--bg4);
  border:1px solid var(--border2);
  border-radius:4px;
  padding:2px 7px;
  font-size:10px;
  color:var(--text2);
  margin:2px;
  font-family:var(--font-mono);
}
.mono{font-family:var(--font-mono);font-size:11px}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--success);display:inline-block;margin-right:5px;animation:urgentPulse 2s infinite}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.spin{display:inline-block;animation:spin 1s linear infinite}
.row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
select option{background:var(--bg3);color:var(--text)}
a{color:var(--ac);text-decoration:none}
a:hover{text-decoration:underline}
</style>
</head>
<body>
<div id="app"></div>
<script>
var PROXY = 'https://restless-lab-de0d.biegajpeter.workers.dev';
var ADMIN_EMAIL = 'admin@loadboard.com';
var ADMIN_PASS = 'Admin@2026';
var CHANNEL = 'ben_usps';
var BID_GAP = 50; // must beat lowest by at least $50

// ── theme ──────────────────────────────────────────────────
var theme = localStorage.getItem('lb_theme')||'dark';
document.documentElement.setAttribute('data-theme', theme);
function toggleTheme(){
  theme = theme==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme',theme);
  localStorage.setItem('lb_theme',theme);
  draw();
}

// ── storage ────────────────────────────────────────────────
function store(k,v){try{if(v===undefined)return JSON.parse(localStorage.getItem(k)||'null');localStorage.setItem(k,JSON.stringify(v));}catch(e){return null;}}

// ── telegram parser ────────────────────────────────────────
function parseHTML(html){
  var tmp=document.createElement('div');tmp.innerHTML=html;
  var msgs=tmp.querySelectorAll('.tgme_widget_message');
  var loads=[],seen={};
  for(var i=0;i<msgs.length;i++){
    var el=msgs[i].querySelector('.tgme_widget_message_text');
    if(!el)continue;
    var txt=el.innerText||el.textContent||'';
    if(txt.indexOf('New Load Bid')<0)continue;
    try{var l=parseLoad(txt,msgs[i]);if(l&&!seen[l.id]){seen[l.id]=1;loads.push(l);}}catch(e){}
  }
  return loads.sort(function(a,b){return b.ts-a.ts;});
}
function parseLoad(txt,msgEl){
  var idM=txt.match(/New Load Bid[:\s#*`_]+(\d+)/i);if(!idM)return null;
  var distM=txt.match(/Distance[:\s*_]+([0-9,]+\.?\d*)\s*miles?/i);
  var pickM=txt.match(/Pickup[:\s*_]+([0-9/]+ [0-9:]+ [APM]+)/i);
  var delM=txt.match(/Delivery[:\s*_]+([0-9/]+ [0-9:]+ [APM]+)/i);
  var stops=[],re=/Stop\s+(\d+)[:\s*_]+([A-Z][A-Z\s]+,\s*[A-Z]{2}\s+\d{5})/gi,m;
  while((m=re.exec(txt))!==null)stops.push({num:parseInt(m[1]),loc:m[2].trim()});
  if(stops.length<2)return null;
  var miles=distM?parseFloat(distM[1].replace(/,/g,'')):0;
  var timeEl=msgEl&&msgEl.querySelector('.tgme_widget_message_date time');
  var linkEl=msgEl&&msgEl.querySelector('a.tgme_widget_message_date');
  return{id:idM[1],miles:miles,origin:stops[0].loc,dest:stops[stops.length-1].loc,stops:stops,
    pickup:pickM?pickM[1]:'--',delivery:delM?delM[1]:'--',
    ts:timeEl?new Date(timeEl.getAttribute('datetime')).getTime():Date.now(),
    link:linkEl?linkEl.href:'https://t.me/'+CHANNEL,isTeam:miles>=500};
}
function fetchLoads(cb){
  fetch(PROXY+'?channel='+CHANNEL).then(function(r){return r.text();}).then(function(html){cb(null,parseHTML(html));}).catch(function(e){cb(e.message,[]);});
}

// ── bid helpers ────────────────────────────────────────────
function lowestBid(loadId){
  var bids=store('lb_bids')||[];
  var lb=bids.filter(function(b){return b.loadId===loadId;});
  if(!lb.length)return null;
  return Math.min.apply(null,lb.map(function(b){return Number(b.rate)||Infinity;}));
}
function bidCount(loadId){
  return (store('lb_bids')||[]).filter(function(b){return b.loadId===loadId;}).length;
}

// ── state ──────────────────────────────────────────────────
var S={view:'auth',session:null,loads:[],loading:false,error:'',lastRefresh:null,bidLoad:null,toast:'',tab:'loads',authTab:'login',authErr:'',authOk:''};
function go(patch){Object.assign(S,patch);draw();}

// ── dom helpers ────────────────────────────────────────────
function mk(tag,attrs,kids){
  var n=document.createElement(tag);
  if(attrs)for(var k in attrs){
    if(k==='cls')n.className=attrs[k];
    else if(k==='style'&&typeof attrs[k]==='object')Object.assign(n.style,attrs[k]);
    else if(k.slice(0,2)==='on')n.addEventListener(k.slice(2),attrs[k]);
    else{try{n.setAttribute(k,attrs[k]);}catch(e){}}
  }
  if(kids)[].concat(kids).forEach(function(c){
    if(c==null||c===false)return;
    n.appendChild(typeof c==='string'||typeof c==='number'?document.createTextNode(String(c)):c);
  });
  return n;
}
function d(cls,kids,sty){return mk('div',{cls:cls,style:sty||{}},kids);}
function t(txt,sty){var s=mk('span',{style:sty||{}});s.textContent=txt;return s;}
function btn(cls,lbl,fn,sty){return mk('button',{cls:cls,style:Object.assign({},sty||{}),onclick:fn},lbl);}
function fld(lbl,inp){return d('ff',[mk('label',{},lbl),inp]);}
function inp(p){
  var i=mk('input',{});
  for(var k in p){
    if(k==='oninput')i.addEventListener('input',p[k]);
    else if(k==='onkeydown')i.addEventListener('keydown',p[k]);
    else i[k]=p[k];
  }
  return i;
}
function bdg(cls,txt){return mk('span',{cls:'badge '+cls},txt);}
function cell(tr,c,s){var td=mk('td',{style:Object.assign({},s||{})});if(typeof c==='string'||typeof c==='number')td.textContent=c;else if(c)td.appendChild(c);tr.appendChild(td);return td;}

// ── timer helpers ──────────────────────────────────────────
function timerEl(ts){
  var rem=30*60*1000-(Date.now()-ts);
  if(rem<=0)return null;
  var mins=Math.floor(rem/60000),secs=Math.floor((rem%60000)/1000);
  var label='⏱ '+(mins>0?mins+'m ':'')+secs+'s';
  var cls=mins>=10?'timer-ok':mins>=5?'timer-warn':'timer-urgent';
  return mk('span',{cls:'timer '+cls,'data-ts':String(ts)},label);
}
function startTimers(){
  if(window._tick)clearInterval(window._tick);
  window._tick=setInterval(function(){
    var now=Date.now(),expired=false;
    S.loads.forEach(function(l){if(now-l.ts>=30*60*1000)expired=true;});
    if(expired){S.loads=S.loads.filter(function(l){return now-l.ts<30*60*1000;});draw();return;}
    document.querySelectorAll('[data-ts]').forEach(function(el){
      var ts=parseInt(el.getAttribute('data-ts'));
      var rem=30*60*1000-(Date.now()-ts);
      if(rem<=0){draw();return;}
      var mins=Math.floor(rem/60000),secs=Math.floor((rem%60000)/1000);
      el.textContent='⏱ '+(mins>0?mins+'m ':'')+secs+'s';
      el.className='timer '+(mins>=10?'timer-ok':mins>=5?'timer-warn':'timer-urgent');
    });
  },1000);
}

// ── draw ───────────────────────────────────────────────────
function draw(){
  var app=document.getElementById('app');
  app.innerHTML='';
  try{
    if(S.view==='auth')app.appendChild(drawAuth());
    else if(S.view==='board')app.appendChild(drawBoard());
    else if(S.view==='admin')app.appendChild(drawAdmin());
  }catch(e){
    app.innerHTML='<div style="padding:40px;color:#E85D3F;font-family:monospace;white-space:pre-wrap">Error: '+e.message+'\n'+e.stack+'</div>';
  }
}

// ── auth ───────────────────────────────────────────────────
function drawAuth(){
  var isLogin=S.authTab==='login';
  var carrier='',mc='',email='',pw='',confirm='';

  function doLogin(){
    go({authErr:''});
    if(email.trim()===ADMIN_EMAIL&&pw===ADMIN_PASS){
      var u={id:'__admin',role:'admin',email:ADMIN_EMAIL};store('lb_sess',u);go({session:u,view:'admin'});return;
    }
    var users=store('lb_users')||[];
    var u=users.filter(function(u){return u.email.toLowerCase()===email.trim().toLowerCase()&&u.pw===pw;})[0];
    if(!u){go({authErr:'Invalid email or password.'});return;}
    if(u.status==='pending'){go({authErr:'Account pending admin approval.'});return;}
    if(u.status==='denied'){go({authErr:'Account access denied.'});return;}
    store('lb_sess',u);go({session:u,view:'board'});
  }
  function doRegister(){
    go({authErr:''});
    if(!carrier||!mc||!email||!pw){go({authErr:'All fields are required.'});return;}
    if(pw!==confirm){go({authErr:'Passwords do not match.'});return;}
    if(pw.length<6){go({authErr:'Password must be at least 6 characters.'});return;}
    var users=store('lb_users')||[];
    if(users.filter(function(u){return u.email.toLowerCase()===email.trim().toLowerCase();}).length){go({authErr:'Email already registered.'});return;}
    if(users.filter(function(u){return u.mc.trim()===mc.trim();}).length){go({authErr:'MC # already registered.'});return;}
    var user={id:'USR-'+Date.now(),role:'carrier',carrier:carrier.trim(),mc:mc.trim(),email:email.trim(),pw:pw,status:'pending',at:Date.now()};
    store('lb_users',[].concat(users,[user]));
    go({authOk:'Registration submitted! Awaiting admin approval.',authTab:'login',authErr:''});
  }

  var wrap=d('auth-wrap');
  // theme toggle top right
  var tt=mk('div',{style:{position:'absolute',top:'16px',right:'20px'}});
  tt.appendChild(themeToggleBtn());
  wrap.appendChild(tt);

  var card=d('auth-card');
  var top=d('auth-top',[
    mk('div',{cls:'auth-logo'},'USPS LOAD BOARD'),
    mk('div',{cls:'auth-sub'},'Carrier Freight Portal')
  ]);
  card.appendChild(top);

  var tabs=d('auth-tabs',[
    mk('button',{cls:'auth-tab'+(isLogin?' on':''),onclick:function(){go({authTab:'login',authErr:'',authOk:''});}}, 'Sign In'),
    mk('button',{cls:'auth-tab'+(!isLogin?' on':''),onclick:function(){go({authTab:'register',authErr:'',authOk:''});}}, 'Request Access')
  ]);
  card.appendChild(tabs);

  var form=d('auth-form');
  if(S.authErr)form.appendChild(d('err',S.authErr));
  if(S.authOk)form.appendChild(d('ok',S.authOk));
  if(isLogin){
    form.appendChild(fld('Email Address',inp({type:'email',placeholder:'your@email.com',oninput:function(e){email=e.target.value;}})));
    form.appendChild(fld('Password',inp({type:'password',placeholder:'••••••••',oninput:function(e){pw=e.target.value;},onkeydown:function(e){if(e.key==='Enter')doLogin();}})));
    form.appendChild(btn('bp','Sign In',doLogin,{width:'100%',marginTop:'4px'}));
  } else {
    form.appendChild(fld('Carrier Name',inp({type:'text',placeholder:'ABC Trucking LLC',oninput:function(e){carrier=e.target.value;}})));
    form.appendChild(fld('MC #',inp({type:'text',placeholder:'MC-123456',oninput:function(e){mc=e.target.value;}})));
    form.appendChild(fld('Email Address',inp({type:'email',placeholder:'dispatch@company.com',oninput:function(e){email=e.target.value;}})));
    form.appendChild(fld('Password',inp({type:'password',placeholder:'Min. 6 characters',oninput:function(e){pw=e.target.value;}})));
    form.appendChild(fld('Confirm Password',inp({type:'password',placeholder:'Re-enter password',oninput:function(e){confirm=e.target.value;}})));
    form.appendChild(btn('bp','Submit Registration',doRegister,{width:'100%',marginTop:'4px'}));
    form.appendChild(mk('p',{style:{fontSize:'11px',color:'var(--text3)',textAlign:'center',marginTop:'10px',lineHeight:'1.6',fontFamily:'var(--font-mono)'}},'Requires admin approval before access.'));
  }
  card.appendChild(form);
  wrap.appendChild(card);
  return wrap;
}

// ── board ──────────────────────────────────────────────────
function drawBoard(){
  var loads=S.loads;
  var bids=store('lb_bids')||[];
  var myBids=bids.filter(function(b){return b.carrierId===S.session.id;});
  var frag=document.createDocumentFragment();
  frag.appendChild(drawNav());
  var page=d('page');

  if(S.toast){
    var te=d('ok',null,{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'16px'});
    te.appendChild(t(S.toast));
    te.appendChild(btn('','×',function(){go({toast:''});},{background:'none',border:'none',color:'var(--success)',fontSize:'18px',cursor:'pointer'}));
    page.appendChild(te);
  }

  page.appendChild(drawStats([
    {label:'Live Loads',val:loads.length,color:'var(--ac)',cls:''},
    {label:'Team Required',val:loads.filter(function(l){return l.isTeam;}).length,color:'var(--danger)',cls:'danger'},
    {label:'My Bids',val:myBids.length,color:'var(--success)',cls:'success'},
    {label:'Awarded',val:myBids.filter(function(b){return b.status==='awarded';}).length,color:'var(--info)',cls:'info'}
  ]));

  var card=d('card');
  // header
  var ch=d('card-header',[
    d('row',[
      mk('span',{cls:'card-title'},'Available Loads'),
      S.loading
        ? mk('span',{style:{fontSize:'11px',color:'var(--text3)',fontFamily:'var(--font-mono)'}},[mk('span',{cls:'spin'},'↻'),' Fetching...'])
        : mk('span',{style:{fontSize:'10px',color:'var(--text3)',fontFamily:'var(--font-mono)'}},[mk('span',{cls:'live-dot'}),loads.length+' active'])
    ],{display:'flex',alignItems:'center',gap:'10px'}),
    d('row',[
      S.lastRefresh?t('Updated '+S.lastRefresh.toLocaleTimeString(),{fontSize:'10px',color:'var(--text3)',fontFamily:'var(--font-mono)'}):null,
      btn('bg','↻ Refresh',doRefresh,{padding:'6px 12px',fontSize:'12px'})
    ])
  ]);
  card.appendChild(ch);

  if(S.error)card.appendChild(d('err',S.error,{margin:'12px 16px'}));

  var oa=d('oa');
  var tbl=mk('table');
  var thead=mk('thead'),hr=mk('tr');
  ['Load #','Route','Miles','Pickup','Delivery','Time Left','Lowest Bid','Bids','My Status',''].forEach(function(h){hr.appendChild(mk('th',{},h));});
  thead.appendChild(hr);tbl.appendChild(thead);
  var tbody=mk('tbody');

  if(!loads.length){
    var tr=mk('tr');var td=mk('td',{colspan:'10',style:{textAlign:'center',padding:'56px',color:'var(--text3)',fontFamily:'var(--font-mono)',fontSize:'12px'}},'NO LOADS ACTIVE — CLICK REFRESH');tr.appendChild(td);tbody.appendChild(tr);
  } else {
    loads.forEach(function(load){
      var mb=myBids.filter(function(b){return b.loadId===load.id;})[0];
      var low=lowestBid(load.id);
      var bc=bidCount(load.id);
      var tr=mk('tr');

      // Load #
      cell(tr,mk('a',{href:load.link,target:'_blank',style:{color:'var(--ac)',fontFamily:'var(--font-mono)',fontSize:'11px'}},'#'+load.id));
      // Route
      var routeCell=mk('td');
      routeCell.appendChild(mk('div',{style:{fontWeight:'600',fontSize:'13px'}},load.origin));
      routeCell.appendChild(mk('div',{style:{color:'var(--text3)',fontSize:'11px',marginTop:'2px',fontFamily:'var(--font-mono)'}},'→ '+load.dest));
      tr.appendChild(routeCell);
      // Miles
      var milesCell=mk('td');
      milesCell.appendChild(t(load.miles.toLocaleString(),{color:load.isTeam?'var(--danger)':'var(--text)',fontWeight:load.isTeam?'700':'400',fontFamily:'var(--font-mono)',fontSize:'12px'}));
      if(load.isTeam){milesCell.appendChild(mk('br'));milesCell.appendChild(bdg('brd','TEAM'));}
      tr.appendChild(milesCell);
      // Pickup / Delivery
      cell(tr,load.pickup,{fontFamily:'var(--font-mono)',fontSize:'10px',color:'var(--text2)'});
      cell(tr,load.delivery,{fontFamily:'var(--font-mono)',fontSize:'10px',color:'var(--text2)'});
      // Timer
      var tc=mk('td');var tel=timerEl(load.ts);tc.appendChild(tel||t('--',{color:'var(--text3)'}));tr.appendChild(tc);
      // Lowest bid
      var lbc=mk('td');
      if(low!==null){
        var lb2=mk('span',{cls:'low-bid'},'$'+low.toLocaleString());
        lbc.appendChild(lb2);
      } else {
        lbc.appendChild(mk('span',{cls:'no-bid'},'No bids yet'));
      }
      tr.appendChild(lbc);
      // Bid count
      cell(tr,String(bc),{fontFamily:'var(--font-mono)',fontSize:'12px',color:'var(--text2)'});
      // My status
      var sc=mk('td');sc.appendChild(mb?bdg('bs','BID PLACED'):bdg('ba','OPEN'));tr.appendChild(sc);
      // Action
      var ac=mk('td');
      (function(l){ac.appendChild(btn(mb?'bo':'bp',mb?'Edit Bid':'Place Bid',function(){go({bidLoad:l});},{padding:'6px 14px',fontSize:'12px'}));})(load);
      tr.appendChild(ac);
      tbody.appendChild(tr);
    });
  }
  tbl.appendChild(tbody);oa.appendChild(tbl);card.appendChild(oa);
  page.appendChild(card);

  // My bids
  if(myBids.length){
    var bc2=d('card');
    bc2.appendChild(d('card-header',[mk('span',{cls:'card-title'},'My Active Bids')]));
    var boa=d('oa'),bt=mk('table'),bh=mk('thead'),bhr=mk('tr');
    ['Load #','Route','My Rate','Low Bid','ETA','Driver(s)','Status'].forEach(function(h){bhr.appendChild(mk('th',{},h));});
    bh.appendChild(bhr);bt.appendChild(bh);
    var btb=mk('tbody');
    myBids.forEach(function(bid){
      var ld=loads.filter(function(l){return l.id===bid.loadId;})[0];
      var low2=lowestBid(bid.loadId);
      var isMyLowest=low2!==null&&Number(bid.rate)===low2;
      var tr=mk('tr');
      cell(tr,'#'+bid.loadId,{fontFamily:'var(--font-mono)',color:'var(--ac)',fontSize:'11px'});
      cell(tr,ld?ld.origin+' → '+ld.dest:'--',{fontSize:'12px'});
      var rateCell=mk('td');
      rateCell.appendChild(t('$'+Number(bid.rate||0).toLocaleString(),{fontFamily:'var(--font-mono)',color:isMyLowest?'var(--success)':'var(--text)',fontWeight:'700',fontSize:'12px'}));
      if(isMyLowest)rateCell.appendChild(mk('span',{style:{marginLeft:'5px'}},bdg('bs','LOWEST')));
      tr.appendChild(rateCell);
      cell(tr,low2!==null?'$'+low2.toLocaleString():'--',{fontFamily:'var(--font-mono)',color:'var(--success)',fontSize:'11px'});
      cell(tr,bid.eta,{fontFamily:'var(--font-mono)',fontSize:'11px'});
      cell(tr,bid.d1n+(bid.d2n?' / '+bid.d2n:''),{fontSize:'12px'});
      var sc=mk('td');sc.appendChild(bdg(bid.status==='awarded'?'bs':bid.status==='rejected'?'brd':'ba',(bid.status||'pending').toUpperCase()));tr.appendChild(sc);
      btb.appendChild(tr);
    });
    bt.appendChild(btb);boa.appendChild(bt);bc2.appendChild(boa);page.appendChild(bc2);
  }

  frag.appendChild(page);
  if(S.bidLoad)frag.appendChild(drawBidModal());
  return frag;
}

// ── bid modal ──────────────────────────────────────────────
function drawBidModal(){
  var load=S.bidLoad,sess=S.session;
  var isTeam=load.miles>=500;
  var bids=store('lb_bids')||[];
  var existing=bids.filter(function(b){return b.loadId===load.id&&b.carrierId===sess.id;})[0];
  var f=existing?Object.assign({},existing):{rate:'',eta:'',d1n:'',d1p:'',d1nd:false,d2n:'',d2p:'',d2nd:false};
  var low=lowestBid(load.id);
  var minRate=low!==null?low-BID_GAP:null;

  function submit(){
    var rate=Number(f.rate);
    if(!f.rate||!f.eta||!f.d1n||!f.d1p){alert('Complete all required fields.');return;}
    if(isTeam&&(!f.d2n||!f.d2p)){alert('Team load: both drivers required.');return;}
    if(minRate!==null&&rate>minRate&&(!existing||Number(existing.rate)!==rate)){
      alert('To beat the current lowest bid of $'+low.toLocaleString()+', you must bid $'+minRate.toLocaleString()+' or less (at least $'+BID_GAP+' under).');return;
    }
    var bid=Object.assign({},f,{loadId:load.id,carrierId:sess.id,carrierName:sess.carrier,mc:sess.mc,status:'pending',at:Date.now()});
    var all=(store('lb_bids')||[]).filter(function(b){return!(b.loadId===load.id&&b.carrierId===sess.id);});
    store('lb_bids',[].concat(all,[bid]));
    go({bidLoad:null,toast:'Bid submitted for load #'+load.id});
  }

  var bg=d('modal-bg');
  var modal=d('modal');

  var mh=d('modal-header',[
    d('',[
      mk('div',{cls:'modal-title'},'Place Bid — #'+load.id),
      mk('div',{cls:'modal-sub'},load.origin+' → '+load.dest+' · '+load.miles.toLocaleString()+' mi · '+load.pickup)
    ]),
    btn('','×',function(){go({bidLoad:null});},{background:'none',border:'none',fontSize:'22px',color:'var(--text3)',cursor:'pointer'})
  ]);
  modal.appendChild(mh);

  var body=d('modal-body');

  // Low bid info box
  if(low!==null){
    var infoBox=d('info-box');
    infoBox.appendChild(t('Current lowest bid: ',{fontFamily:'var(--font-mono)',fontSize:'12px'}));
    infoBox.appendChild(t('$'+low.toLocaleString(),{fontFamily:'var(--font-mono)',fontSize:'13px',fontWeight:'700',color:'var(--success)'}));
    infoBox.appendChild(mk('br'));
    infoBox.appendChild(t('To beat it, you must bid $'+minRate.toLocaleString()+' or less (at least $'+BID_GAP+' under).',{fontFamily:'var(--font-mono)',fontSize:'11px',color:'var(--text2)'}));
    body.appendChild(infoBox);
  } else {
    body.appendChild(d('info-box',t('No bids yet — be the first!',{fontFamily:'var(--font-mono)',fontSize:'12px'})));
  }

  if(isTeam)body.appendChild(d('tw','⚠ Team load ('+load.miles.toLocaleString()+' mi) — info required for both drivers.'));

  var rr=mk('div',{cls:'fg'});
  var rateInp=inp({type:'number',placeholder:minRate!==null?'Max $'+minRate:'Enter rate',value:f.rate,oninput:function(e){f.rate=e.target.value;}});
  rr.appendChild(fld('All-In Rate ($)',rateInp));
  rr.appendChild(fld('ETA to Destination',inp({type:'date',value:f.eta,oninput:function(e){f.eta=e.target.value;}})));
  body.appendChild(rr);

  function driverBlock(label,pre,color){
    var blk=d('ds');
    blk.appendChild(mk('div',{cls:'dl',style:color?{color:color}:{}},'Driver '+label));
    var dr=mk('div',{cls:'fg'});
    dr.appendChild(fld('Full Name',inp({type:'text',placeholder:'Full Name',value:f[pre+'n']||'',oninput:function(e){f[pre+'n']=e.target.value;}})));
    dr.appendChild(fld('Phone Number',inp({type:'tel',placeholder:'(555) 000-0000',value:f[pre+'p']||'',oninput:function(e){f[pre+'p']=e.target.value;}})));
    blk.appendChild(dr);
    var yes=mk('button',{cls:'tgl'+(f[pre+'nd']===true?' on':'')},'Yes — Non-Dom');
    var no=mk('button',{cls:'tgl'+(f[pre+'nd']!==true?' on':'')},'No — Home State');
    yes.addEventListener('click',function(){f[pre+'nd']=true;yes.className='tgl on';no.className='tgl';});
    no.addEventListener('click',function(){f[pre+'nd']=false;yes.className='tgl';no.className='tgl on';});
    blk.appendChild(fld('CDL Non-Domiciled?',d('tg',[yes,no])));
    return blk;
  }
  body.appendChild(driverBlock('1',  'd1', null));
  if(isTeam)body.appendChild(driverBlock('2 (Team)','d2','var(--info)'));

  var footer=d('',null,{display:'flex',gap:'10px',marginTop:'18px',paddingTop:'16px',borderTop:'1px solid var(--border)'});
  footer.appendChild(btn('bg','Cancel',function(){go({bidLoad:null});},{flex:'1'}));
  footer.appendChild(btn('bp',existing?'Update Bid':'Submit Bid',submit,{flex:'2'}));
  body.appendChild(footer);
  modal.appendChild(body);
  bg.appendChild(modal);
  bg.addEventListener('click',function(e){if(e.target===bg)go({bidLoad:null});});
  return bg;
}

    var tb2=mk('tbody');
    if(!loads.length){
      var tr=mk('tr');var td=mk('td',{colspan:'9',style:{textAlign:'center',padding:'48px',color:'var(--text3)',fontFamily:'var(--font-mono)',fontSize:'11px'}},S.loading?'LOADING...':'NO ACTIVE LOADS');tr.appendChild(td);tb2.appendChild(tr);
    }else{
      loads.forEach(function(load){
        var tr=mk('tr');
        cell(tr,mk('a',{href:load.link,target:'_blank'},'' +load.id));
        cell(tr,load.origin,{fontWeight:'600'});cell(tr,load.dest);
        var mc2=mk('td');
        mc2.appendChild(t(load.miles.toLocaleString(),{color:load.isTeam?'var(--danger)':'var(--text)',fontWeight:load.isTeam?'700':'400',fontFamily:'var(--font-mono)',fontSize:'11px'}));
        if(load.isTeam){mc2.appendChild(mk('br'));mc2.appendChild(bdg('brd','TEAM'));}
        tr.appendChild(mc2);
        cell(tr,load.pickup,{fontFamily:'var(--font-mono)',fontSize:'10px',color:'var(--text2)'});
        cell(tr,load.delivery,{fontFamily:'var(--font-mono)',fontSize:'10px',color:'var(--text2)'});
        var tc=mk('td');var tel=timerEl(load.ts);tc.appendChild(tel||t('--'));tr.appendChild(tc);
        cell(tr,String(bidCount(load.id)),{fontFamily:'var(--font-mono)',fontSize:'11px'});
        var low=lowestBid(load.id);
        cell(tr,low!==null?'$'+low.toLocaleString():'--',{fontFamily:'var(--font-mono)',color:'var(--success)',fontSize:'11px'});
        tb2.appendChild(tr);
      });
    }
    tbl.appendChild(tb2);oa.appendChild(tbl);card.appendChild(oa);page.appendChild(card);
  }

  if(tab==='carriers'){
    if(pending.length){
      var pc=d('card',null,{borderColor:'rgba(232,93,63,.3)',marginBottom:'16px'});
      pc.appendChild(d('card-header',[mk('span',{cls:'card-title',style:{color:'var(--danger)'}},'Pending Approval'),bdg('brd',String(pending.length))]));
      var pt=mk('table');var ph=mk('thead');var phr=mk('tr');
      ['Carrier','MC #','Email','Registered',''].forEach(function(h){phr.appendChild(mk('th',{},h));});
      ph.appendChild(phr);pt.appendChild(ph);
      var pb=mk('tbody');
      pending.forEach(function(u){
        var tr=mk('tr');
        cell(tr,u.carrier,{fontWeight:'600'});
        cell(tr,u.mc,{fontFamily:'var(--font-mono)',color:'var(--ac)',fontSize:'11px'});
        cell(tr,u.email);
        cell(tr,new Date(u.at).toLocaleDateString());
        var ac=mk('td');
        (function(uid){
          ac.appendChild(btn('bp','Approve',function(){approveUser(uid,'approved');},{padding:'5px 12px',fontSize:'12px',marginRight:'6px'}));
          ac.appendChild(btn('bd','Deny',function(){approveUser(uid,'denied');},{padding:'5px 12px',fontSize:'12px'}));
        })(u.id);
        tr.appendChild(ac);pb.appendChild(tr);
      });
      pt.appendChild(pb);pc.appendChild(pt);page.appendChild(pc);
    }
    var ac2=d('card');
    ac2.appendChild(d('card-header',[mk('span',{cls:'card-title'},'All Carriers'),bdg('bs',String(users.length))]));
    var at=mk('table');var ah=mk('thead');var ahr=mk('tr');
    ['Carrier','MC #','Email','Status','Bids',''].forEach(function(h){ahr.appendChild(mk('th',{},h));});
    ah.appendChild(ahr);at.appendChild(ah);
    var ab=mk('tbody');
    if(!users.length){var tr2=mk('tr');var td2=mk('td',{colspan:'6',style:{textAlign:'center',padding:'40px',color:'var(--text3)',fontFamily:'var(--font-mono)',fontSize:'11px'}},'NO CARRIERS YET');tr2.appendChild(td2);ab.appendChild(tr2);}
    else users.forEach(function(u){
      var tr=mk('tr');
      cell(tr,u.carrier,{fontWeight:'600'});
      cell(tr,u.mc,{fontFamily:'var(--font-mono)',color:'var(--ac)',fontSize:'11px'});
      cell(tr,u.email);
      var sc=mk('td');sc.appendChild(bdg(u.status==='approved'?'bs':u.status==='denied'?'brd':'ba',u.status.toUpperCase()));tr.appendChild(sc);
      cell(tr,String(bids.filter(function(b){return b.carrierId===u.id;}).length),{fontFamily:'var(--font-mono)',fontSize:'11px'});
      var btns=mk('td');
      (function(uid,ust){
        if(ust!=='approved')btns.appendChild(btn('bs2','Approve',function(){approveUser(uid,'approved');},{padding:'4px 10px',fontSize:'12px',marginRight:'6px'}));
        if(ust!=='denied')btns.appendChild(btn('bd','Revoke',function(){approveUser(uid,'denied');},{padding:'4px 10px',fontSize:'12px'}));
      })(u.id,u.status);
      tr.appendChild(btns);ab.appendChild(tr);
    });
    at.appendChild(ab);ac2.appendChild(at);page.appendChild(ac2);
  }

  if(tab==='bids'){
    if(!bids.length)page.appendChild(d('card',mk('div',{style:{padding:'48px',textAlign:'center',color:'var(--text3)',fontFamily:'var(--font-mono)',fontSize:'11px'}},'NO BIDS YET')));
    loads.filter(function(l){return bids.some(function(b){return b.loadId===l.id;});}).forEach(function(load){
      var lb=bids.filter(function(b){return b.loadId===load.id;});
      var low3=lowestBid(load.id);
      var card2=d('card',null,{marginBottom:'14px'});
      var ch2=d('card-header',[
        d('',null,{display:'flex',alignItems:'center',gap:'10px',flexWrap:'wrap'}),
        bdg('bi',lb.length+' bid'+(lb.length!==1?'s':''))
      ]);
      var chLeft=ch2.firstChild;
      chLeft.appendChild(mk('span',{style:{fontFamily:'var(--font-mono)',color:'var(--ac)',fontSize:'11px'}},'#'+load.id));
      chLeft.appendChild(t(load.origin+' → '+load.dest,{fontWeight:'600',fontSize:'14px'}));
      chLeft.appendChild(t(load.miles.toLocaleString()+' mi',{color:'var(--text3)',fontSize:'11px',fontFamily:'var(--font-mono)'}));
      if(low3!==null)chLeft.appendChild(mk('span',{cls:'low-bid'},'Lowest: $'+low3.toLocaleString()));
      card2.appendChild(ch2);
      var oa2=d('oa');var tbl2=mk('table');var th2=mk('thead');var hr2=mk('tr');
      ['Carrier','MC #','Rate','ETA','Driver 1','Driver 2','Status',''].forEach(function(h){hr2.appendChild(mk('th',{},h));});
      th2.appendChild(hr2);tbl2.appendChild(th2);
      var tb3=mk('tbody');
      lb.sort(function(a,b){return Number(a.rate)-Number(b.rate);}).forEach(function(bid){
        var isLow=low3!==null&&Number(bid.rate)===low3;
        var tr=mk('tr');
        if(isLow)tr.style.background='rgba(60,185,122,.05)';
        cell(tr,bid.carrierName,{fontWeight:'600'});
        cell(tr,bid.mc,{fontFamily:'var(--font-mono)',color:'var(--ac)',fontSize:'11px'});
        var rc=mk('td');
        rc.appendChild(t('$'+Number(bid.rate||0).toLocaleString(),{fontFamily:'var(--font-mono)',color:isLow?'var(--success)':'var(--text)',fontWeight:'700',fontSize:'12px'}));
        if(isLow)rc.appendChild(mk('span',{style:{marginLeft:'5px'}},bdg('bs','LOWEST')));
        tr.appendChild(rc);
        cell(tr,bid.eta,{fontFamily:'var(--font-mono)',fontSize:'11px'});
        cell(tr,bid.d1n+' '+bid.d1p+(bid.d1nd?' [ND]':''),{fontSize:'12px'});
        cell(tr,bid.d2n?bid.d2n+' '+bid.d2p+(bid.d2nd?' [ND]':''):'--',{fontSize:'12px'});
        var sc=mk('td');sc.appendChild(bdg(bid.status==='awarded'?'bs':bid.status==='rejected'?'brd':'ba',(bid.status||'pending').toUpperCase()));tr.appendChild(sc);
        var ac3=mk('td');
        (function(lid,cid){
          if(bid.status!=='awarded')ac3.appendChild(btn('bp','Award',function(){updateBid(lid,cid,'awarded');},{padding:'4px 10px',fontSize:'12px',marginRight:'6px'}));
          if(bid.status!=='rejected')ac3.appendChild(btn('bd','Reject',function(){updateBid(lid,cid,'rejected');},{padding:'4px 10px',fontSize:'12px'}));
        })(bid.loadId,bid.carrierId);
        tr.appendChild(ac3);tb3.appendChild(tr);
      });
      tbl2.appendChild(tb3);oa2.appendChild(tbl2);card2.appendChild(oa2);page.appendChild(card2);
    });
  }

  frag.appendChild(page);
  return frag;
}

function approveUser(id,status){var u=(store('lb_users')||[]).map(function(u){return u.id===id?Object.assign({},u,{status:status}):u;});store('lb_users',u);draw();}
function updateBid(loadId,carrierId,status){var b=(store('lb_bids')||[]).map(function(b){return b.loadId===loadId&&b.carrierId===carrierId?Object.assign({},b,{status:status}):b;});store('lb_bids',b);draw();}

var _timer=null;
function doRefresh(){
  go({loading:true,error:''});
  fetchLoads(function(err,loads){
    var now=Date.now();
    var fresh=(loads||[]).filter(function(l){return now-l.ts<30*60*1000;});
    go({loads:fresh,loading:false,lastRefresh:new Date(),error:err?'Could not fetch: '+err:''});
    startTimers();
  });
}

// Boot
var sess=store('lb_sess');
if(sess&&sess.id){S.session=sess;S.view=sess.role==='admin'?'admin':'board';}
draw();
startTimers();
doRefresh();
_timer=setInterval(doRefresh,120000);
</script>
</body>
</html>
