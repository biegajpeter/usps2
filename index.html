<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>USPS Load Board</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--ac:#4A9EE8;--danger:#E85D3F;--success:#3CB97A;--info:#9B7FE8;--warn:#E8A030;--r:10px;--rs:6px;--fd:'Syne',sans-serif;--fm:'Space Mono',monospace;--fb:'DM Sans',sans-serif}
[data-theme="dark"]{--bg:#0D0D0F;--bg2:#141417;--bg3:#1C1C21;--bg4:#242429;--bo:rgba(255,255,255,.07);--bo2:rgba(255,255,255,.13);--tx:#F0EFE8;--tx2:#B8B6C0;--tx3:#8A8890;--glow:rgba(74,158,232,.15)}
[data-theme="light"]{--bg:#F5F3EE;--bg2:#EDEAE3;--bg3:#FFFFFF;--bg4:#E8E5DE;--bo:rgba(0,0,0,.08);--bo2:rgba(0,0,0,.15);--tx:#1A1814;--tx2:#5A5450;--tx3:#7A7570;--glow:rgba(74,158,232,.12)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--fb);background:var(--bg);color:var(--tx);min-height:100vh;font-size:14px;transition:background .25s,color .25s}
a{color:var(--ac);text-decoration:none}a:hover{text-decoration:underline}
.nav{background:var(--bg2);border-bottom:1px solid var(--bo);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100}
.nav-l{display:flex;align-items:center;gap:14px}
.logo{font-family:var(--fd);font-weight:800;font-size:18px;letter-spacing:.04em;text-transform:uppercase}
.logo-a{color:var(--ac)}.logo-b{color:var(--tx)}
.logo-s{font-family:var(--fm);font-size:9px;color:var(--tx3);letter-spacing:.12em;text-transform:uppercase;display:block;margin-top:-3px}
.apill{background:var(--bg3);border:1px solid var(--bo2);border-radius:20px;padding:3px 11px;font-family:var(--fm);font-size:10px;color:var(--tx2)}
.nav-r{display:flex;align-items:center;gap:10px}
.ctag{font-family:var(--fm);font-size:12px;color:var(--tx);background:var(--bg3);border:1px solid var(--bo2);border-radius:20px;padding:4px 13px}
.ctag strong{color:var(--ac)}
.tbtn{width:40px;height:23px;background:var(--bg4);border:1px solid var(--bo2);border-radius:12px;position:relative;cursor:pointer;flex-shrink:0}
.tbtn::after{content:'';position:absolute;top:3px;left:3px;width:15px;height:15px;border-radius:50%;background:var(--ac);transition:transform .2s}
[data-theme="light"] .tbtn::after{transform:translateX(17px)}
.ti{font-size:10px;position:absolute;top:50%;transform:translateY(-50%);pointer-events:none}
.ti.m{left:5px}.ti.s{right:4px}
.page{max-width:1300px;margin:0 auto;padding:24px 20px}
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:24px}
.sc{background:var(--bg2);border:1px solid var(--bo);border-radius:var(--r);padding:16px 18px;position:relative;overflow:hidden}

.card{background:var(--bg2);border:1px solid var(--bo);border-radius:var(--r);overflow:hidden;margin-bottom:16px}

.ct{font-family:var(--fd);font-weight:800;font-size:15px;letter-spacing:.03em;text-transform:uppercase}
table{border-collapse:collapse;width:100%}
th{text-align:left;font-family:var(--fm);font-size:10px;font-weight:700;color:var(--tx2);text-transform:uppercase;letter-spacing:.08em;padding:10px 16px;border-bottom:1px solid var(--bo);white-space:nowrap;background:var(--bg3)}

input,select{width:100%;padding:9px 12px;border:1px solid var(--bo2);border-radius:var(--rs);background:var(--bg3);color:var(--tx);font-family:var(--fb);font-size:14px;outline:none;transition:border-color .15s,box-shadow .15s;color-scheme:dark}

input:focus,select:focus{border-color:var(--ac);box-shadow:0 0 0 3px var(--glow)}

button:hover{opacity:.85;transform:translateY(-1px)}button:active{transform:translateY(0)}
.bp{background:var(--ac);color:#fff;border:none;padding:9px 18px}
.bo2c{background:transparent;color:var(--ac);border:1px solid var(--ac);padding:8px 17px}

.info-box{background:rgba(74,158,232,.08);border:1px solid rgba(74,158,232,.25);border-radius:var(--rs);padding:10px 14px;color:var(--ac);font-size:13px;margin-bottom:14px}
.tabs{display:flex;border-bottom:1px solid var(--bo);margin-bottom:20px}
.tab{padding:10px 18px;background:none;border:none;border-bottom:2px solid transparent;color:var(--tx3);font-family:var(--fm);font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;margin-bottom:-1px;border-radius:0;transition:color .15s,border-color .15s}

.timer{display:inline-flex;align-items:center;gap:4px;font-family:var(--fm);font-size:10px;font-weight:700;padding:3px 8px;border-radius:4px;white-space:nowrap}
.tok{background:rgba(60,185,122,.12);color:var(--success);border:1px solid rgba(60,185,122,.25)}
.twarn{background:rgba(232,160,48,.12);color:var(--warn);border:1px solid rgba(232,160,48,.3)}
.turg{background:rgba(232,93,63,.12);color:var(--danger);border:1px solid rgba(232,93,63,.3);animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.spin{display:inline-block;animation:spin 1s linear infinite}
.ldot{width:6px;height:6px;border-radius:50%;background:var(--success);display:inline-block;margin-right:5px;animation:pulse 2s infinite}
.low-bid{display:inline-flex;align-items:center;font-family:var(--fm);font-size:10px;font-weight:700;padding:3px 8px;border-radius:4px;background:rgba(60,185,122,.1);color:var(--success);border:1px solid rgba(60,185,122,.25);white-space:nowrap}
.no-bid{display:inline-flex;align-items:center;font-family:var(--fm);font-size:10px;padding:3px 8px;border-radius:4px;background:var(--bg4);color:var(--tx3);border:1px solid var(--bo);white-space:nowrap}
.map-btn{display:inline-flex;align-items:center;gap:4px;background:var(--bg4);border:1px solid var(--bo2);border-radius:6px;padding:5px 10px;font-size:11px;color:var(--tx2);text-decoration:none;font-family:var(--fm);white-space:nowrap;transition:all .15s}
.map-btn:hover{border-color:var(--ac);color:var(--ac);text-decoration:none}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.72);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px;backdrop-filter:blur(4px)}
.modal{background:var(--bg2);border:1px solid var(--bo2);border-radius:14px;width:100%;max-width:580px;max-height:90vh;overflow-y:auto;box-shadow:0 32px 80px rgba(0,0,0,.45)}
.mh{padding:18px 22px;border-bottom:1px solid var(--bo);display:flex;justify-content:space-between;align-items:flex-start;background:var(--bg3)}
.mt{font-family:var(--fd);font-weight:800;font-size:17px;text-transform:uppercase;letter-spacing:.03em}
.ms{font-size:12px;color:var(--tx2);margin-top:4px;font-family:var(--fm)}
.mb{padding:22px}
.auth-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:var(--bg);position:relative;overflow:hidden}
.auth-wrap::before{content:'LOAD BOARD';position:absolute;font-family:var(--fd);font-weight:800;font-size:16vw;color:var(--tx);opacity:.02;white-space:nowrap;pointer-events:none;top:50%;left:50%;transform:translate(-50%,-50%);user-select:none}
.auth-card{background:var(--bg2);border:1px solid var(--bo2);border-radius:14px;width:100%;max-width:440px;overflow:hidden;position:relative;z-index:1;box-shadow:0 24px 80px rgba(0,0,0,.35)}
.auth-top{padding:32px 32px 24px;border-bottom:1px solid var(--bo);background:var(--bg3);text-align:center}
.auth-logo{font-family:var(--fd);font-weight:800;font-size:26px;letter-spacing:.04em;text-transform:uppercase;margin-bottom:4px}
.auth-sub{font-family:var(--fm);font-size:9px;color:var(--tx3);letter-spacing:.14em;text-transform:uppercase}
.auth-tabs{display:flex;border-bottom:1px solid var(--bo)}
.auth-tab{flex:1;padding:12px;background:none;border:none;border-bottom:2px solid transparent;color:var(--tx3);font-family:var(--fm);font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;border-radius:0;transition:all .15s}
.auth-tab.on{color:var(--ac);border-bottom-color:var(--ac)}
.auth-form{padding:24px 28px}
</style>

<body>
<div id="app"></div>
<script>
var PROXY='https://restless-lab-de0d.biegajpeter.workers.dev';
var ADMIN_EMAIL='admin@loadboard.com';
var ADMIN_PASS='Admin@2026';
var CHANNEL='usps_live_sean';
var BID_GAP=50;

/* theme */
var _theme=localStorage.getItem('lb_theme')||'dark';
document.documentElement.setAttribute('data-theme',_theme);
function toggleTheme(){_theme=_theme==='dark'?'light':'dark';document.documentElement.setAttribute('data-theme',_theme);localStorage.setItem('lb_theme',_theme);draw();}

/* storage */
function store(k,v){try{if(v===undefined)return JSON.parse(localStorage.getItem(k)||'null');localStorage.setItem(k,JSON.stringify(v));}catch(e){return null;}}

/* ── PARSER ──────────────────────────────────────────────────────────────────
   Format (single line, emojis as separators):
   "✉️ USPS by Sean👤 SOLO - 109435785📍 BATON ROUGE, LA📍 NORTH HOUSTON, TX
    ⏰ PU: 04/05 12:00 PM CT  🚛 Distance: 282.3 miles⏳ Bidding Ends at: 02:45 PM ET"
   Date is DD/MM — displayed and parsed as MM/DD.
   Bidding Ends time is Eastern Time (EDT=UTC-4, EST=UTC-5).
   ───────────────────────────────────────────────────────────────────────────── */
function parseHTML(html){
  var tmp=document.createElement('div');
  tmp.innerHTML=html;
  var msgs=tmp.querySelectorAll('.tgme_widget_message');
  var loads=[],seen={};
  for(var i=0;i<msgs.length;i++){
    var el=msgs[i].querySelector('.tgme_widget_message_text');
    if(!el)continue;
    var txt=el.innerText||el.textContent||'';
    if(!txt)continue;
    if(txt.indexOf('SOLO')<0&&txt.indexOf('TEAM')<0)continue;
    var mapLink=null;
    var ancs=msgs[i].querySelectorAll('a[href]');
    for(var j=0;j<ancs.length;j++){
      var href=ancs[j].getAttribute('href')||'';
      var atxt=(ancs[j].textContent||'').toLowerCase();
      if(href.indexOf('maps.google')>=0||href.indexOf('goo.gl')>=0||href.indexOf('maps.app')>=0){mapLink=href;break;}
      if(atxt.indexOf('route')>=0||atxt.indexOf('map')>=0){mapLink=href;break;}
    }
    try{
      var load=parseLoad(txt,msgs[i],mapLink);
      if(load&&!seen[load.id]){seen[load.id]=1;loads.push(load);}
    }catch(e){}
  }
  return loads.sort(function(a,b){return b.ts-a.ts;});
}

function parseLoad(txt,msgEl,mapLink){
  var idM=txt.match(/(?:SOLO|TEAM)\s*-\s*(\d+)/i);
  if(!idM)return null;
  var isTeam=/TEAM/i.test(txt);

  var distM=txt.match(/Distance[:\s]+([0-9,]+\.?\d*)\s*miles?/i);
  var miles=distM?parseFloat(distM[1].replace(/,/g,'')):0;

  /* Pickup: "PU: 04/05 12:00 PM CT" — format is DD/MM, display as MM/DD */
  var pickM=txt.match(/PU[:\s]+(\d{1,2}\/\d{1,2}\s+\d{1,2}:\d{2}\s+[APM]{2}(?:\s+[A-Z]{1,3})?)/i);
  var pickup='--';
  if(pickM){
    var raw=pickM[1];
    var dm=raw.match(/^(\d{1,2})\/(\d{1,2})(.*)$/);
    pickup=dm?dm[2]+'/'+dm[1]+dm[3]:raw; /* swap DD/MM → MM/DD */
  }

  /* Bidding ends: "Bidding Ends at: 02:45 PM ET" */
  var bidM=txt.match(/Bidding\s+Ends\s+at[:\s]+(\d{1,2}:\d{2}\s+[APM]{2}(?:\s+[A-Z]{1,3})?)/i);
  if(!bidM)bidM=txt.match(/Bid(?:ding)?\s*Ends?\s*(?:at)?[:\s]+(\d{1,2}:\d{2}\s+[APM]{2}(?:\s+[A-Z]{1,3})?)/i);

  /* Stops: split on 📍 pin emoji (U+1F4CD) */
  var PIN=String.fromCodePoint(0x1F4CD);
  var parts=txt.replace(new RegExp(PIN,'g'),'||').split('||');
  var stops=[];
  var tzSkip={ET:1,PT:1,AM:1,PM:1,PU:1,TO:1};
  for(var i=0;i<parts.length;i++){
    var part=parts[i].replace(/^[^A-Za-z]*/,'').trim();
    var m=part.match(/^([A-Za-z][A-Za-z\s\.\-]+),\s*([A-Za-z]{2})(?:\s|$|[^A-Za-z])/);
    if(m){
      var city=m[1].trim().toUpperCase(),state=m[2].trim().toUpperCase();
      if(tzSkip[state])continue;
      if(city.length>=2&&city.length<=50)stops.push(city+', '+state);
    }
  }
  if(stops.length<2)return null;

  var timeEl=msgEl&&msgEl.querySelector('.tgme_widget_message_date time');
  var linkEl=msgEl&&msgEl.querySelector('a.tgme_widget_message_date');
  var postTs=timeEl?new Date(timeEl.getAttribute('datetime')).getTime():Date.now();

  /* Parse expiresAt from bidding ends time, treating as Eastern Time.
     EDT = UTC-4 (Mar–Nov), EST = UTC-5 (Dec–Feb) */
  var expiresAt=postTs+30*60*1000;
  if(bidM){
    try{
      var bStr=bidM[1].replace(/\s+[A-Z]{1,3}$/,'').trim();
      var bm=bStr.match(/(\d{1,2}):(\d{2})\s+([APM]{2})/i);
      if(bm){
        var hh=parseInt(bm[1]),mm=parseInt(bm[2]),ap=bm[3].toUpperCase();
        if(ap==='PM'&&hh!==12)hh+=12;
        if(ap==='AM'&&hh===12)hh=0;
        var now=new Date();
        var mo=now.getMonth();
        var etOff=(mo>=2&&mo<=10)?4:5; /* EDT vs EST offset in hours */
        var utcMs=Date.UTC(now.getUTCFullYear(),now.getUTCMonth(),now.getUTCDate(),hh,mm,0)+(etOff*3600000);
        if(utcMs<Date.now()-120000)utcMs+=86400000; /* if past, try tomorrow */
        expiresAt=utcMs;
      }
    }catch(e){}
  }

  /* Parse pickupTs for hot detection (pickup within 3 hours).
     Pickup is already in MM/DD format after swap above. */
  var pickupTs=null;
  if(pickM){
    try{
      var puRaw=pickup.replace(/\s+[A-Z]{1,3}$/,'').trim();
      var puM=puRaw.match(/(\d{1,2})\/(\d{1,2})\s+(\d{1,2}:\d{2}\s+[APM]{2})/i);
      if(puM){
        var yr=new Date().getFullYear();
        var pd=new Date(puM[1]+'/'+puM[2]+'/'+yr+' '+puM[3]);
        if(!isNaN(pd.getTime())){
          if(pd.getTime()<Date.now()-3600000)pd.setFullYear(pd.getFullYear()+1);
          pickupTs=pd.getTime();
        }
      }
    }catch(e){}
  }
  var isHot=pickupTs!==null&&(pickupTs-Date.now())>0&&(pickupTs-Date.now())<3*60*60*1000;

  return{
    id:idM[1],miles:miles,isTeam:isTeam||(miles>=500),isHot:isHot,pickupTs:pickupTs,
    origin:stops[0],dest:stops[stops.length-1],
    stops:stops.map(function(s,i2){return{num:i2+1,loc:s};}),
    pickup:pickup,biddingEnds:bidM?bidM[1].trim():null,
    ts:postTs,expiresAt:expiresAt,
    link:linkEl?linkEl.href:'https://t.me/'+CHANNEL,
    mapLink:mapLink||null
  };
}

function fetchLoads(cb){
  fetch(PROXY+'?channel='+CHANNEL)
    .then(function(r){return r.text();})
    .then(function(html){cb(null,parseHTML(html));})
    .catch(function(e){cb(String(e),[]);});
}

/* bid helpers */
function lowestBid(loadId){
  var lb=(store('lb_bids')||[]).filter(function(b){return b.loadId===loadId;});
  if(!lb.length)return null;
  return Math.min.apply(null,lb.map(function(b){return Number(b.rate)||Infinity;}));
}
function bidCount(loadId){return(store('lb_bids')||[]).filter(function(b){return b.loadId===loadId;}).length;}

/* state
   S.loads        = active loads still open for bidding
   S.expiredLoads = loads whose bidding window has closed (kept for admin bids tab)
*/
var S={
  view:'auth',session:null,
  loads:[],expiredLoads:[],
  loading:false,error:'',lastRefresh:null,
  toast:'',tab:'loads',
  authTab:'login',authErr:'',authOk:''
};
function go(p){Object.assign(S,p);draw();}

/* merge a load into expiredLoads without duplicates */
function archiveLoad(load){
  for(var i=0;i<S.expiredLoads.length;i++){if(S.expiredLoads[i].id===load.id)return;}
  S.expiredLoads.push(load);
}

/* dom helpers */
function mk(tag,attrs,kids){
  var n=document.createElement(tag);
  if(attrs)for(var k in attrs){
    if(k==='cls')n.className=attrs[k];
    else if(k==='style'&&typeof attrs[k]==='object')Object.assign(n.style,attrs[k]);
    else if(k.slice(0,2)==='on')n.addEventListener(k.slice(2),attrs[k]);
    else{try{n.setAttribute(k,attrs[k]);}catch(ex){}}
  }
  if(kids)[].concat(kids).forEach(function(c){
    if(c==null||c===false)return;
    n.appendChild(typeof c==='string'||typeof c==='number'?document.createTextNode(String(c)):c);
  });
  return n;
}
function d(cls,kids,sty){return mk('div',{cls:cls,style:sty||{}},kids);}
function t(txt,sty){var s=mk('span',{style:sty||{}});s.textContent=String(txt);return s;}
function btn(cls,lbl,fn,sty){return mk('button',{cls:cls,style:Object.assign({},sty||{}),onclick:fn},lbl);}
function fld(lbl,el){return d('ff',[mk('label',{},lbl),el]);}
function inp(p){
  var i=mk('input',{});
  for(var k in p){

/* timer — only shown when ≤30 min remain */
function timerEl(load){
  var exp=load.expiresAt;
  if(!exp)return null;
  var rem=exp-Date.now();
  if(rem<=0||rem>30*60*1000)return null;
  var mins=Math.floor(rem/60000),secs=Math.floor((rem%60000)/1000);
  var lbl='⏱ '+(mins>0?mins+'m ':'')+secs+'s';
  var cls=mins>=10?'tok':mins>=5?'twarn':'turg';
  return mk('span',{cls:'timer '+cls,'data-exp':String(exp)},lbl);
}

function startTimers(){
  if(window._tick)clearInterval(window._tick);
  window._tick=setInterval(function(){
    var now=Date.now(),changed=false;

    /* move expired loads off the live board → expiredLoads */
    var active=[],justExpired=[];
    for(var i=0;i<S.loads.length;i++){
      if(S.loads[i].expiresAt&&now>=S.loads[i].expiresAt){
        justExpired.push(S.loads[i]);
      }else{
        active.push(S.loads[i]);
      }
    }
    if(justExpired.length){
      S.loads=active;
      for(var j=0;j<justExpired.length;j++)archiveLoad(justExpired[j]);
      draw();return;
    }

    /* re-evaluate hot status */
    for(var i=0;i<S.loads.length;i++){
      var l=S.loads[i];
      var nowHot=l.pickupTs&&(l.pickupTs-now)>0&&(l.pickupTs-now)<3*60*60*1000;
      if(nowHot!==l.isHot){l.isHot=nowHot;changed=true;}
    }
    if(changed){draw();return;}

    /* tick visible timer elements */
    document.querySelectorAll('[data-exp]').forEach(function(el){
      var exp=parseInt(el.getAttribute('data-exp'));
      var rem=exp-Date.now();
      if(rem<=0||rem>30*60*1000){el.style.display='none';return;}
      el.style.display='';
      var mins=Math.floor(rem/60000),secs=Math.floor((rem%60000)/1000);
      el.textContent='⏱ '+(mins>0?mins+'m ':'')+secs+'s';
      el.className='timer '+(mins>=10?'tok':mins>=5?'twarn':'turg');
    });
  },1000);
}

function draw(){
  var app=document.getElementById('app');
  if(!app)return;
  app.innerHTML='';
  try{
    if(S.view==='auth')app.appendChild(drawAuth());
    else if(S.view==='board')app.appendChild(drawBoard());
    else if(S.view==='admin')app.appendChild(drawAdmin());
  }catch(e){
    app.innerHTML='<pre style="padding:32px;color:#E85D3F;font-family:monospace;font-size:12px">ERROR: '+e.message+'\n'+e.stack+'</pre>';
  }
}

/* auth */
function drawAuth(){
  var isLogin=S.authTab==='login';
  var carrier='',mc='',email='',pw='',confirm='';
  function doLogin(){
    go({authErr:''});
    if(email.trim()===ADMIN_EMAIL&&pw===ADMIN_PASS){var u={id:'__admin',role:'admin',email:ADMIN_EMAIL};store('lb_sess',u);go({session:u,view:'admin'});return;}
    var users=store('lb_users')||[],u=null;
    for(var i=0;i<users.length;i++){if(users[i].email.toLowerCase()===email.trim().toLowerCase()&&users[i].pw===pw){u=users[i];break;}}
    if(!u){go({authErr:'Invalid email or password.'});return;}
    if(u.status==='pending'){go({authErr:'Account pending admin approval.'});return;}
    if(u.status==='denied'){go({authErr:'Account access denied.'});return;}
    store('lb_sess',u);go({session:u,view:'board'});

    go({authErr:''});

      if(users[i].mc.trim()===mc.trim()){go({authErr:'MC # already registered.'});return;}
    }

    store('lb_users',[].concat(users,[user]));

    mk('button',{cls:'auth-tab'+(!isLogin?' on':''),onclick:function(){go({authTab:'register',authErr:'',authOk:''});}},'Request Access')
  ]));

  if(S.authOk)form.appendChild(d('ok-box',S.authOk));
  if(isLogin){
    form.appendChild(fld('Email Address',inp({type:'email',placeholder:'your@email.com',oninput:function(e){email=e.target.value;}})));
    form.appendChild(fld('Password',inp({type:'password',placeholder:'••••••••',oninput:function(e){pw=e.target.value;},onkeydown:function(e){if(e.key==='Enter')doLogin();}})));
    form.appendChild(btn('bp','Sign In',doLogin,{width:'100%',marginTop:'4px'}));
  }else{
    form.appendChild(fld('Carrier Name',inp({type:'text',placeholder:'ABC Trucking LLC',oninput:function(e){carrier=e.target.value;}})));
    form.appendChild(fld('MC #',inp({type:'text',placeholder:'MC-123456',oninput:function(e){mc=e.target.value;}})));
    form.appendChild(fld('Email Address',inp({type:'email',placeholder:'dispatch@company.com',oninput:function(e){email=e.target.value;}})));
    form.appendChild(fld('Password',inp({type:'password',placeholder:'Min. 6 characters',oninput:function(e){pw=e.target.value;}})));
    form.appendChild(fld('Confirm Password',inp({type:'password',placeholder:'Re-enter password',oninput:function(e){confirm=e.target.value;}})));

      cell(tr,bid.eta?(bid.eta+'').replace('T',' '):'--',{fontFamily:"var(--fm)",fontSize:'11px'});

/* bid modal — appended directly to body, never calls draw() on input */
function openBidModal(load){
  var old=document.getElementById('bid-modal-bg');if(old)old.parentNode.removeChild(old);
  document.body.appendChild(buildBidModal(load));
}
function closeBidModal(){
  var el=document.getElementById('bid-modal-bg');if(el)el.parentNode.removeChild(el);
}

function buildBidModal(load){
  var sess=S.session,isTeam=load.isTeam;
  var bids=store('lb_bids')||[],existing=null;
  for(var i=0;i<bids.length;i++){if(bids[i].loadId===load.id&&bids[i].carrierId===sess.id){existing=bids[i];break;}}
  var low=lowestBid(load.id),minRate=low!==null?low-BID_GAP:null;

  var bg=mk('div',{cls:'modal-bg',id:'bid-modal-bg'});
  var modal=d('modal');

  modal.appendChild(d('mh',[
    d('',[
      mk('div',{cls:'mt'},'Place Bid — #'+load.id),
      mk('div',{cls:'ms'},load.origin+' → '+load.dest+' · '+load.miles.toLocaleString()+' mi')
    ]),
    btn('','×',closeBidModal,{background:'none',border:'none',fontSize:'24px',color:'var(--tx3)',cursor:'pointer',lineHeight:'1'})
  ]));

  var body=d('mb');
  if(low!==null){
    var ib=d('info-box');
    ib.appendChild(t('Current lowest bid: ',{fontFamily:"var(--fm)",fontSize:'13px'}));
    ib.appendChild(t('$'+low.toLocaleString(),{fontFamily:"var(--fm)",fontSize:'14px',fontWeight:'700',color:'var(--success)'}));
    ib.appendChild(mk('br'));
    ib.appendChild(mk('span',{style:{fontFamily:"var(--fm)",fontSize:'11px',color:'var(--tx2)',display:'block',marginTop:'4px'}},
      'To beat it, bid $'+minRate.toLocaleString()+' or less (at least $'+BID_GAP+' under).'));

    body.appendChild(d('info-box',mk('span',{style:{fontFamily:"var(--fm)",fontSize:'13px'}},'No bids yet — be the first!')));
  }
  if(isTeam)body.appendChild(d('warn-box','⚠ Team load ('+load.miles.toLocaleString()+' mi) — info required for both drivers.'));

  var rr=mk('div',{cls:'fg'});
  rr.appendChild(fld('All-In Rate ($)',mk('input',{type:'number',id:'bid-rate',placeholder:minRate!==null?'Max $'+minRate:'Enter rate',value:existing?existing.rate:''})));
  rr.appendChild(fld('ETA to Pickup (Date & Time)',mk('input',{type:'datetime-local',id:'bid-eta',value:existing?existing.eta:''})));
  body.appendChild(rr);

    var blk=d('ds');

    dr.appendChild(fld('Phone Number',mk('input',{type:'tel',id:'bid-'+pre+'p',placeholder:'(555) 000-0000',value:existing&&existing[pre+'p']?existing[pre+'p']:''})));
    blk.appendChild(dr);
    var cbw=d('ff');
    cbw.appendChild(mk('label',{},'Driver Has Domiciled CDL'));
    var cbr2=d('cbr');
    var cb=mk('input',{type:'checkbox',id:'bid-'+pre+'nd'});
    if(existing&&existing[pre+'nd'])cb.checked=true;
    cbr2.appendChild(cb);
    cbr2.appendChild(mk('label',{htmlFor:'bid-'+pre+'nd'},'Yes, driver holds a domiciled CDL'));
    cbw.appendChild(cbr2);blk.appendChild(cbw);
    return blk;
  }
  body.appendChild(driverBlock('1','d1',null));
  if(isTeam)body.appendChild(driverBlock('2 (Team)','d2','var(--info)'));

  var errEl=mk('div',{cls:'err-box',id:'bid-err',style:{display:'none',marginTop:'12px'}});
  body.appendChild(errEl);

  var footer=d('',null,{display:'flex',gap:'10px',marginTop:'18px',paddingTop:'16px',borderTop:'1px solid var(--bo)'});
  footer.appendChild(btn('bg2c','Cancel',closeBidModal,{flex:'1'}));
  footer.appendChild(btn('bp',existing?'Update Bid':'Submit Bid',submitBid,{flex:'2'}));
  body.appendChild(footer);
  modal.appendChild(body);
  bg.appendChild(modal);
  bg.addEventListener('click',function(e){if(e.target===bg)closeBidModal();});
  return bg;

  function showErr(msg){var e=document.getElementById('bid-err');if(e){e.textContent=msg;e.style.display='block';}}
  function submitBid(){
    var rate=document.getElementById('bid-rate').value;
    var eta=document.getElementById('bid-eta').value;
    var d1n=document.getElementById('bid-d1n').value;
    var d1p=document.getElementById('bid-d1p').value;
    var d1nd=document.getElementById('bid-d1nd').checked;
    var d2n=isTeam?((document.getElementById('bid-d2n')||{}).value||''):'';
    var d2p=isTeam?((document.getElementById('bid-d2p')||{}).value||''):'';
    var d2nd=isTeam?((document.getElementById('bid-d2nd')||{}).checked||false):false;
    if(!rate||!eta||!d1n||!d1p){showErr('Complete all required fields.');return;}
    if(isTeam&&(!d2n||!d2p)){showErr('Team load: full info required for both drivers.');return;}
    if(minRate!==null&&Number(rate)>minRate&&(!existing||Number(existing.rate)!==Number(rate))){
      showErr('Must bid $'+minRate.toLocaleString()+' or less to beat the current low of $'+low.toLocaleString()+'.');return;
    }
    var bid={rate:rate,eta:eta,d1n:d1n,d1p:d1p,d1nd:d1nd,d2n:d2n,d2p:d2p,d2nd:d2nd,
      loadId:load.id,carrierId:sess.id,carrierName:sess.carrier,mc:sess.mc,status:'pending',at:Date.now()};
    var all=(store('lb_bids')||[]).filter(function(b){return!(b.loadId===load.id&&b.carrierId===sess.id);});
    store('lb_bids',[].concat(all,[bid]));
    closeBidModal();S.toast='Bid submitted for load #'+load.id;draw();
  }
}

  [{id:'loads',label:'Live Loads',b:loads.length},{id:'carriers',label:'Carriers',b:pending.length>0?pending.length+' PENDING':users.length},{id:'bids',label:'Bids',b:bids.length}]
  .forEach(function(t2){
    var tb=mk('button',{cls:'tab'+(tab===t2.id?' on':''),onclick:function(){go({tab:t2.id});}},t2.label);
    tb.appendChild(mk('span',{style:{fontSize:'9px',background:'var(--bg4)',padding:'1px 7px',borderRadius:'10px',marginLeft:'6px',fontFamily:"var(--fm)"}},String(t2.b)));
    tabs.appendChild(tb);
  });
  page.appendChild(tabs);

  /* loads tab */
  if(tab==='loads'){
    page.appendChild(row([
      t(S.loading?'Fetching...':'● Live from @'+CHANNEL+' · auto-refreshes every 2 min',{fontSize:'11px',color:'var(--tx3)',fontFamily:"var(--fm)"}),
      row([S.lastRefresh?t('Updated '+S.lastRefresh.toLocaleTimeString(),{fontSize:'11px',color:'var(--tx3)',fontFamily:"var(--fm)"}):null,
        btn('bp','↻ Refresh Now',doRefresh,{fontSize:'12px',padding:'7px 14px'})])
    ],{justifyContent:'space-between',marginBottom:'14px',flexWrap:'wrap',gap:'8px'}));
    if(S.error)page.appendChild(d('err-box',S.error,{marginBottom:'12px'}));
    var card=d('card'),oa=d('oa'),tbl=mk('table'),th=mk('thead'),hr=mk('tr');
    ['Load #','Origin','Dest','Miles','Pickup','Timer','Bids','Low Bid',''].forEach(function(h){hr.appendChild(mk('th',{},h));});
    th.appendChild(hr);tbl.appendChild(th);
    var tb2=mk('tbody');
    if(!loads.length){
      var etr=mk('tr');var etd=mk('td',{colspan:'9',style:{textAlign:'center',padding:'48px',color:'var(--tx3)',fontFamily:"var(--fm)",fontSize:'11px'}});
      etd.textContent=S.loading?'LOADING...':'NO ACTIVE LOADS';etr.appendChild(etd);tb2.appendChild(etr);
    }else{
      loads.forEach(function(load){
        var tr=mk('tr');if(load.isHot)tr.className='hot-row';
        cell(tr,mk('a',{href:load.link,target:'_blank',style:{color:'var(--ac)',fontFamily:"var(--fm)",fontSize:'11px'}},'#'+load.id));
        cell(tr,load.origin,{fontWeight:'600'});cell(tr,load.dest,{color:'var(--tx2)',fontSize:'13px'});
        var mc3=mk('td');
        mc3.appendChild(t(load.miles.toLocaleString(),{color:load.isTeam?'var(--danger)':'var(--tx)',fontWeight:load.isTeam?'700':'400',fontFamily:"var(--fm)",fontSize:'11px'}));
        if(load.isTeam){mc3.appendChild(mk('br'));mc3.appendChild(bdg('brd','TEAM'));}
        if(load.isHot){mc3.appendChild(mk('br'));mc3.appendChild(bdg('bhot','🔥 HOT'));}
        tr.appendChild(mc3);
        cell(tr,load.pickup,{fontFamily:"var(--fm)",fontSize:'11px',color:'var(--tx2)'});
        var tc=mk('td');var tel=timerEl(load);tc.appendChild(tel||t('--'));tr.appendChild(tc);
        cell(tr,String(bidCount(load.id)),{fontFamily:"var(--fm)",fontSize:'12px'});
        var low2=lowestBid(load.id);
        cell(tr,low2!==null?'$'+low2.toLocaleString():'--',{fontFamily:"var(--fm)",color:'var(--success)',fontSize:'12px'});
        var mapc=mk('td');if(load.mapLink)mapc.appendChild(mk('a',{href:load.mapLink,target:'_blank',cls:'map-btn'},'🗺 Route'));tr.appendChild(mapc);
        tb2.appendChild(tr);
      });
    }
    tbl.appendChild(tb2);oa.appendChild(tbl);card.appendChild(oa);page.appendChild(card);
  }

  /* carriers tab */
  if(tab==='carriers'){
    if(pending.length){
      var pc=d('card',null,{borderColor:'rgba(232,93,63,.3)',marginBottom:'16px'});
      pc.appendChild(d('ch',[mk('span',{cls:'ct',style:{color:'var(--danger)'}},'Pending Approval'),bdg('brd',String(pending.length))]));
      var pt=mk('table'),ph=mk('thead'),phr=mk('tr');
      ['Carrier','MC #','Email','Registered',''].forEach(function(h){phr.appendChild(mk('th',{},h));});
      ph.appendChild(phr);pt.appendChild(ph);var pb=mk('tbody');
      pending.forEach(function(u){
        var tr=mk('tr');
        cell(tr,u.carrier,{fontWeight:'600'});cell(tr,u.mc,{fontFamily:"var(--fm)",color:'var(--ac)',fontSize:'12px'});cell(tr,u.email);cell(tr,new Date(u.at).toLocaleDateString());
        var ac=mk('td');
        (function(uid){
          ac.appendChild(btn('bp','Approve',function(){approveUser(uid,'approved');},{padding:'5px 12px',fontSize:'12px',marginRight:'6px'}));
          ac.appendChild(btn('bd','Deny',function(){approveUser(uid,'denied');},{padding:'5px 12px',fontSize:'12px'}));
        })(u.id);
        tr.appendChild(ac);pb.appendChild(tr);
      });
      pt.appendChild(pb);pc.appendChild(pt);page.appendChild(pc);
    }
    var ac2=d('card');
    ac2.appendChild(d('ch',[mk('span',{cls:'ct'},'All Carriers'),bdg('bs',String(users.length))]));
    var at=mk('table'),ah=mk('thead'),ahr=mk('tr');
    ['Carrier','MC #','Email','Status','Bids',''].forEach(function(h){ahr.appendChild(mk('th',{},h));});
    ah.appendChild(ahr);at.appendChild(ah);var ab=mk('tbody');
    if(!users.length){
      var etr2=mk('tr');var etd2=mk('td',{colspan:'6',style:{textAlign:'center',padding:'40px',color:'var(--tx3)',fontFamily:"var(--fm)",fontSize:'11px'}});
      etd2.textContent='NO CARRIERS YET';etr2.appendChild(etd2);ab.appendChild(etr2);
    }else{
      users.forEach(function(u){
        var tr=mk('tr');
        cell(tr,u.carrier,{fontWeight:'600'});cell(tr,u.mc,{fontFamily:"var(--fm)",color:'var(--ac)',fontSize:'12px'});cell(tr,u.email);
        var sc=mk('td');sc.appendChild(bdg(u.status==='approved'?'bs':u.status==='denied'?'brd':'ba',u.status.toUpperCase()));tr.appendChild(sc);
        cell(tr,String(bids.filter(function(b){return b.carrierId===u.id;}).length),{fontFamily:"var(--fm)",fontSize:'12px'});
        var btns=mk('td');
        (function(uid,ust){
          if(ust!=='approved')btns.appendChild(btn('bs2','Approve',function(){approveUser(uid,'approved');},{padding:'4px 10px',fontSize:'12px',marginRight:'6px'}));
          if(ust!=='denied')btns.appendChild(btn('bd','Revoke',function(){approveUser(uid,'denied');},{padding:'4px 10px',fontSize:'12px'}));
        })(u.id,u.status);
        tr.appendChild(btns);ab.appendChild(tr);
      });
    }
    at.appendChild(ab);ac2.appendChild(at);page.appendChild(ac2);
  }

  /* bids tab — uses allLoads so expired loads still show */
  if(tab==='bids'){
    if(!bids.length){
      var nb=d('card');var nbt=mk('div',{style:{padding:'48px',textAlign:'center',color:'var(--tx3)',fontFamily:"var(--fm)",fontSize:'11px'}});
      nbt.textContent='NO BIDS YET';nb.appendChild(nbt);page.appendChild(nb);
    }
    allLoads.filter(function(l){return bids.some(function(b){return b.loadId===l.id;});}).forEach(function(load){
      var lb=bids.filter(function(b){return b.loadId===load.id;});
      lb.sort(function(a,b2){return Number(a.rate)-Number(b2.rate);});
      var low3=lowestBid(load.id);
      var isExpired=load.expiresAt&&Date.now()>=load.expiresAt;
      var card2=d('card',null,{marginBottom:'14px'});
      var ch2=d('ch');
      var chl=d('',null,{display:'flex',alignItems:'center',gap:'10px',flexWrap:'wrap'});
      chl.appendChild(mk('span',{style:{fontFamily:"var(--fm)",color:'var(--ac)',fontSize:'11px'}},'#'+load.id));
      chl.appendChild(t(load.origin+' → '+load.dest,{fontWeight:'600',fontSize:'14px'}));
      chl.appendChild(t(load.miles.toLocaleString()+' mi',{color:'var(--tx3)',fontSize:'11px',fontFamily:"var(--fm)"}));
      if(isExpired)chl.appendChild(bdg('bgr','BIDDING CLOSED'));
      if(low3!==null)chl.appendChild(mk('span',{cls:'low-bid'},'Lowest: $'+low3.toLocaleString()));
      ch2.appendChild(chl);ch2.appendChild(bdg('bi',lb.length+' bid'+(lb.length!==1?'s':'')));
      card2.appendChild(ch2);
      var oa2=d('oa'),tbl2=mk('table'),th2=mk('thead'),hr2=mk('tr');
      ['Carrier','MC #','Rate','ETA to Pickup','Driver 1','Driver 2','Status',''].forEach(function(h){hr2.appendChild(mk('th',{},h));});
      th2.appendChild(hr2);tbl2.appendChild(th2);var tb3=mk('tbody');
      lb.forEach(function(bid){
        var isLow=low3!==null&&Number(bid.rate)===low3;
        var tr=mk('tr');if(isLow)tr.style.background='rgba(60,185,122,.05)';
        cell(tr,bid.carrierName,{fontWeight:'600'});
        cell(tr,bid.mc,{fontFamily:"var(--fm)",color:'var(--ac)',fontSize:'11px'});
        var rc3=mk('td');
        rc3.appendChild(t('$'+Number(bid.rate||0).toLocaleString(),{fontFamily:"var(--fm)",color:isLow?'var(--success)':'var(--tx)',fontWeight:'700',fontSize:'13px'}));
        if(isLow)rc3.appendChild(mk('span',{style:{marginLeft:'5px'}},bdg('bs','LOWEST')));
        tr.appendChild(rc3);
        cell(tr,bid.eta?(bid.eta+'').replace('T',' '):'--',{fontFamily:"var(--fm)",fontSize:'11px'});
        cell(tr,bid.d1n+' '+bid.d1p+(bid.d1nd?' [Dom]':''),{fontSize:'13px'});
        cell(tr,bid.d2n?bid.d2n+' '+bid.d2p+(bid.d2nd?' [Dom]':''):'--',{fontSize:'13px'});
        var sc=mk('td');sc.appendChild(bdg(bid.status==='awarded'?'bs':bid.status==='rejected'?'brd':'ba',(bid.status||'pending').toUpperCase()));tr.appendChild(sc);
        var ac3=mk('td');
        (function(lid,cid){
          if(bid.status!=='awarded')ac3.appendChild(btn('bp','Award',function(){updateBid(lid,cid,'awarded');},{padding:'4px 10px',fontSize:'12px',marginRight:'6px'}));
          if(bid.status!=='rejected')ac3.appendChild(btn('bd','Reject',function(){updateBid(lid,cid,'rejected');},{padding:'4px 10px',fontSize:'12px'}));
        })(bid.loadId,bid.carrierId);
        tr.appendChild(ac3);tb3.appendChild(tr);
      });
      tbl2.appendChild(tb3);oa2.appendChild(tbl2);card2.appendChild(oa2);page.appendChild(card2);
    });
  }

  frag.appendChild(page);return frag;
}

function approveUser(id,status){
  var u=(store('lb_users')||[]).map(function(u){return u.id===id?Object.assign({},u,{status:status}):u;});
  store('lb_users',u);draw();
}
function updateBid(loadId,carrierId,status){
  var b=(store('lb_bids')||[]).map(function(b){return b.loadId===loadId&&b.carrierId===carrierId?Object.assign({},b,{status:status}):b;});
  store('lb_bids',b);draw();
}

var _timer=null;
function doRefresh(){
  go({loading:true,error:''});
  fetchLoads(function(err,loads){
    var now=Date.now();
    var active=[],expired=[];
    (loads||[]).forEach(function(l){
      if(l.expiresAt&&now>=l.expiresAt)expired.push(l);
      else active.push(l);
    });
    /* archive anything that came back already expired */
    for(var i=0;i<expired.length;i++)archiveLoad(expired[i]);
    go({loads:active,loading:false,lastRefresh:new Date(),error:err?'Fetch error: '+err:''});
    startTimers();
  });
}

/* boot */
(function(){
  var sess=store('lb_sess');
  if(sess&&sess.id){S.session=sess;S.view=sess.role==='admin'?'admin':'board';}
  draw();
  startTimers();
  doRefresh();
  _timer=setInterval(doRefresh,120000);
})();
</script>
</body>
</html>
